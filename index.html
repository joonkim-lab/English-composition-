LV(3);
CH(3, "조동사의 뉘앙스");
UU("L3-1-1","used to — 과거의 습관",
"'예전엔 ~했었지(지금은 아니야)'는 used to! 추억을 이야기하는 조동사예요.",
[["이 동네에 예전엔 작은 서점이 있었어요.","있었어요(예전엔) + 작은 서점이 + 이 동네에","There used to be a small bookstore in this neighborhood.|There used to be a small bookstore in this town.","there used to be"],
["그는 예전엔 수줍었지만 지금은 매우 외향적이에요.","그는 + 예전엔 수줍었어요 + 그러나 + 지금은 매우 외향적이에요","He used to be shy, but now he is very outgoing.|He used to be shy, but he is very outgoing now.","used to be"],
["나는 예전에 매주 일요일마다 낚시를 가곤 했어요.","나는 가곤 했어요 + 낚시를 + 매주 일요일마다","I used to go fishing every Sunday.","used to + 동사원형"]]);
UU("L3-1-2","would — 공손한 제안·요청",
"Would you like ~?로 품격 있는 제안을! 영어 매너의 핵심 표현이에요.",
[["차 한 잔 드시겠어요?","드시겠어요? + 차 한 잔을","Would you like a cup of tea?|Would you like some tea?","Would you like ~?"],
["창가 자리로 하시겠어요?","원하시겠어요? + 창가 자리를","Would you like a window seat?","a window seat"],
["저와 함께 저녁 드시겠어요?","드시겠어요? + 저녁을 + 저와 함께","Would you like to have dinner with me?|Would you like to join me for dinner?","Would you like to ~?"]]);
UU("L3-1-3","would/must — 추측",
"'~일 거야', '~임에 틀림없어' — 확신의 정도를 조동사로 조절하는 기술!",
[["그는 지금쯤 집에 있을 거예요.","그는 + 있을 거예요 + 집에 + 지금쯤","He would be home by now.|He should be home by now.","would = 추측"],
["그게 가장 안전한 선택일 거예요.","그게 + ~일 거예요 + 가장 안전한 선택","That would be the safest choice.|That would be the safest option.","would be"],
["그는 열쇠를 집에 두고 왔음에 틀림없어요.","그는 + 두고 왔음에 틀림없어요 + 열쇠를 + 집에","He must have left his keys at home.|He must have left his key at home.","must have p.p."]]);
UU("L3-1-4","should have p.p. — 후회",
"'~했어야 했는데'라는 후회와 아쉬움은 should have p.p.로! 과거를 돌아보는 표현이에요.",
[["나는 더 일찍 잤어야 했어요.","나는 + 잤어야 했어요 + 더 일찍","I should have gone to bed earlier.|I should have slept earlier.","should have p.p."],
["우리는 표를 미리 샀어야 했어요.","우리는 + 샀어야 했어요 + 표를 + 미리","We should have bought the tickets in advance.|We should have bought tickets in advance.","in advance"],
["너는 의사에게 갔어야 했어.","너는 + 갔어야 했어 + 의사에게","You should have seen a doctor.|You should have gone to the doctor.","see a doctor"]]);
UU("L3-1-5","could have p.p. — 가능성",
"'~할 수도 있었다', '~했을 수도 있다' — 일어나지 않은 가능성을 표현해요.",
[["너 크게 다칠 수도 있었어!","너는 + 다칠 수도 있었어 + 크게","You could have been seriously hurt!|You could have been badly hurt!","could have been p.p."],
["우리가 이길 수도 있었는데.","우리가 + 이길 수도 있었어","We could have won.|We could have won the game.","could have p.p."],
["그녀는 버스를 놓쳤을 수도 있어요.","그녀는 + 놓쳤을 수도 있어요 + 버스를","She could have missed the bus.|She might have missed the bus.","could/might have"]]);
UU("L3-1-6","be able to — 시제 자유자재",
"can의 변신! 미래엔 will be able to, 완료엔 have been able to로 능력을 모든 시제에 담아요.",
[["우리는 마침내 표를 구할 수 있었어요.","우리는 + 구할 수 있었어요 + 표를 + 마침내","We were finally able to get the tickets.|We were finally able to get tickets.","were able to"],
["언젠가 너는 영어로 꿈을 꿀 수 있게 될 거야.","너는 + 꿈꿀 수 있게 될 거야 + 영어로 + 언젠가","Someday you will be able to dream in English.|One day you will be able to dream in English.","will be able to"],
["부상 후에 그는 다시 뛸 수 있게 되었어요.","그는 + 뛸 수 있게 되었어요 + 다시 + 부상 후에","He was able to run again after the injury.|After the injury, he was able to run again.","was able to"]]);

CH(3, "비교 — 견주어 말하기");
UU("L3-2-1","비교급",
"-er than, more ~ than으로 둘을 비교! much, a lot으로 차이를 강조할 수도 있어요.",
[["이 문제는 저것보다 훨씬 더 어려워요.","이 문제는 + 훨씬 더 어려워요 + 저것보다","This problem is much harder than that one.|This question is much more difficult than that one.","much + 비교급"],
["그녀는 나보다 더 빨리 달려요.","그녀는 + 달려요 + 더 빨리 + 나보다","She runs faster than me.|She runs faster than I do.","faster than"],
["오늘은 어제보다 더 따뜻해요.","오늘은 + 더 따뜻해요 + 어제보다","Today is warmer than yesterday.|It is warmer today than yesterday.","-er than"]]);
UU("L3-2-2","원급 비교 (as ~ as)",
"'~만큼 ~하다'는 as ~ as! not as ~ as로 '~만큼은 아니다'까지 표현해요.",
[["그는 자기 형만큼 키가 커요.","그는 + 키가 커요 + 자기 형만큼","He is as tall as his brother.|He is as tall as his older brother.","as ~ as"],
["그 시험은 생각만큼 어렵지 않았어요.","그 시험은 + 어렵지 않았어요 + 내가 생각한 만큼","The exam was not as hard as I thought.|The test wasn't as difficult as I expected.","not as ~ as"],
["가능한 한 빨리 저에게 전화해 주세요.","전화해 주세요 + 저에게 + 가능한 한 빨리","Please call me as soon as possible.|Call me as soon as possible, please.","as soon as possible"]]);
UU("L3-2-3","배수 비교",
"twice as big as, three times as much — 몇 배인지까지 정확하게 비교해요!",
[["이 방은 내 방보다 두 배 커요.","이 방은 + 두 배 커요 + 내 방보다","This room is twice as big as mine.|This room is twice as large as my room.","twice as ~ as"],
["그 가게는 평소보다 세 배 붐볐어요.","그 가게는 + 세 배 붐볐어요 + 평소보다","The store was three times as crowded as usual.|The shop was three times more crowded than usual.","three times"],
["이 책은 저 책보다 두 배 두꺼워요.","이 책은 + 두 배 두꺼워요 + 저 책보다","This book is twice as thick as that one.|This book is twice as thick as that book.","twice as thick"]]);
UU("L3-2-4","the 비교급, the 비교급",
"'~할수록 더 ~하다'는 The more ~, the more ~! 비례 관계를 한 문장에 담아요.",
[["많이 연습할수록 더 좋아져요.","많이 연습할수록 + 더 좋아져요","The more you practice, the better you get.|The more you practice, the better you become.","The 비교급, the 비교급"],
["일찍 시작할수록 더 일찍 끝나요.","일찍 시작할수록 + 더 일찍 끝나요","The earlier you start, the earlier you finish.|The sooner you start, the sooner you finish.","the earlier"],
["문장이 길어질수록 뼈대가 더 중요해져요.","문장이 길어질수록 + 뼈대가 더 중요해져요","The longer the sentence gets, the more important the structure becomes.|The longer the sentence is, the more important the skeleton becomes.","the longer"]]);
UU("L3-2-5","최상급",
"the -est, the most ~로 '가장'을 표현! 범위(of the year, in the city)까지 붙여 완성해요.",
[["오늘이 올해 들어 가장 추운 날이에요.","오늘이 + 가장 추운 날이에요 + 올해 들어","Today is the coldest day of the year.","the + 최상급"],
["그것은 내 인생 최고의 결정이었어요.","그것은 + 최고의 결정이었어요 + 내 인생의","It was the best decision of my life.","the best"],
["이곳이 이 도시에서 가장 오래된 건물이에요.","이곳이 + 가장 오래된 건물이에요 + 이 도시에서","This is the oldest building in the city.|This is the oldest building in this city.","the oldest in"]]);
UU("L3-2-6","최상급 응용",
"one of the -est, the best I've ever seen — 최상급을 더 풍성하게 쓰는 패턴들!",
[["그는 우리 학교에서 가장 빠른 선수 중 한 명이에요.","그는 + 가장 빠른 선수 중 한 명이에요 + 우리 학교에서","He is one of the fastest players in our school.|He is one of the fastest players at our school.","one of the + 복수"],
["이것은 내가 지금까지 본 것 중 최고의 영화예요.","이것은 + 최고의 영화예요 + 내가 지금까지 본 것 중","This is the best movie I have ever seen.|This is the best movie I've ever watched.","ever + p.p."],
["건강만큼 중요한 것은 없어요.","아무것도 + 중요하지 않아요 + 건강만큼","Nothing is as important as health.|Nothing is more important than health.","Nothing as ~ as"]]);

CH(3, "정중한 질문과 간접의문문");
UU("L3-3-1","정중한 직접 의문문",
"Could you ~?, Would you mind ~? — 부탁의 품격을 높이는 정중한 의문문!",
[["실례지만, 역으로 가는 길을 알려 주시겠어요?","실례지만 + 알려 주시겠어요? + 저에게 + 역으로 가는 길을","Excuse me, could you tell me the way to the station?|Excuse me, could you tell me how to get to the station?","Could you ~?"],
["창문을 열어도 괜찮을까요?","괜찮을까요? + 제가 창문을 여는 것이","Would you mind if I opened the window?|Do you mind if I open the window?","Would you mind if"],
["잠시 시간 좀 내주시겠어요?","내주시겠어요? + 잠시 시간을","Could you spare a moment?|Could you spare a few minutes?","spare a moment"]]);
UU("L3-3-2","간접의문문 기본",
"질문 속의 질문! Do you know 뒤에서는 「의문사 + 주어 + 동사」 어순으로 바뀌어요.",
[["가장 가까운 은행이 어디인지 아세요?","아세요? + 가장 가까운 은행이 어디인지","Do you know where the nearest bank is?","where + 주어 + 동사"],
["그가 몇 시에 돌아오는지 아세요?","아세요? + 그가 몇 시에 돌아오는지","Do you know what time he comes back?|Do you know when he comes back?","what time he comes"],
["이 단어가 무슨 뜻인지 말해 주시겠어요?","말해 주시겠어요? + 이 단어가 무슨 뜻인지","Could you tell me what this word means?|Can you tell me what this word means?","what it means"]]);
UU("L3-3-3","간접의문문 (yes/no 질문)",
"yes/no 질문을 문장 속에 넣을 땐 if/whether로 연결해요.",
[["이 자리가 비어 있는지 아세요?","아세요? + 이 자리가 비어 있는지","Do you know if this seat is taken?|Do you know whether this seat is taken?","if + 주어 + 동사"],
["그 가게가 오늘 여는지 확인해 줄래?","확인해 줄래? + 그 가게가 오늘 여는지","Can you check if the store is open today?|Could you check whether the shop is open today?","check if"],
["제가 여기 앉아도 되는지 여쭤봐도 될까요?","여쭤봐도 될까요? + 제가 여기 앉아도 되는지","May I ask if I can sit here?|Can I ask if I may sit here?","ask if"]]);
UU("L3-3-4","간접의문문 (how)",
"how로 방법·정도를 정중하게! Could you explain how ~? 패턴을 익혀요.",
[["이 기계가 어떻게 작동하는지 설명해 주시겠어요?","설명해 주시겠어요? + 이 기계가 어떻게 작동하는지","Could you explain how this machine works?|Can you explain how this machine works?","how it works"],
["회의가 얼마나 걸릴지 아세요?","아세요? + 회의가 얼마나 걸릴지","Do you know how long the meeting will take?|Do you know how long the meeting will last?","how long"],
["공항까지 얼마나 먼지 말해 주시겠어요?","말해 주시겠어요? + 공항까지 얼마나 먼지","Could you tell me how far it is to the airport?|Can you tell me how far the airport is?","how far"]]);
UU("L3-3-5","do you think 삽입",
"Who do you think will win? — 의문사 바로 뒤에 do you think를 끼워 넣는 고급 어순!",
[["누가 이길 거라고 생각하세요?","누가 + 생각하세요? + 이길 거라고","Who do you think will win?","의문사 + do you think"],
["그녀가 몇 시에 도착할 거라고 생각하세요?","몇 시에 + 생각하세요? + 그녀가 도착할 거라고","What time do you think she will arrive?|When do you think she will arrive?","what time do you think"],
["그 영화 어땠다고 생각하세요?","어떻게 + 생각하세요? + 그 영화에 대해","What do you think of that movie?|What do you think about that movie?","What do you think of"]]);
UU("L3-3-6","부가의문문",
"'그렇지?'라고 확인할 땐 꼬리 질문! 긍정문엔 부정 꼬리, 부정문엔 긍정 꼬리.",
[["오늘 날씨 좋다, 그렇지?","오늘 날씨 좋다 + 그렇지?","The weather is nice today, isn't it?|It's a nice day, isn't it?","긍정 → isn't it"],
["너 어제 거기 안 갔잖아, 그렇지?","너 안 갔잖아 + 거기에 + 어제 + 그렇지?","You didn't go there yesterday, did you?","부정 → did you"],
["그녀는 피아노를 칠 줄 알아, 그렇지?","그녀는 칠 줄 알아 + 피아노를 + 그렇지?","She can play the piano, can't she?","can → can't she"]]);

CH(3, "관계사절 깊이 들어가기");
UU("L3-4-1","주격·목적격 복습 + 확장",
"레벨 1의 관계대명사를 더 길고 자연스러운 문장으로! 임계점을 향한 복습 + 확장이에요.",
[["나는 세 개의 언어를 하는 친구가 있어요.","나는 가지고 있어요 + 친구를 + 세 개의 언어를 하는","I have a friend who speaks three languages.|I have a friend that speaks three languages.","who + 동사"],
["네가 어제 입었던 그 드레스 정말 예뻤어.","그 드레스는 + 네가 어제 입었던 + 정말 예뻤어","The dress you wore yesterday was really pretty.|The dress that you wore yesterday was really pretty.","목적격 생략"],
["우리를 태워 준 그 기사님은 정말 친절했어요.","그 기사님은 + 우리를 태워 준 + 정말 친절했어요","The driver who gave us a ride was very kind.|The driver that gave us a ride was really kind.","who gave"]]);
UU("L3-4-2","that만 쓰는 경우",
"all, everything, the first, 최상급 뒤에는 that! 관계대명사의 특별 규칙을 익혀요.",
[["이것이 내가 필요한 전부예요.","이것이 + 전부예요 + 내가 필요한","This is all that I need.|This is all I need.","all that"],
["그는 우리를 도와준 첫 번째 사람이었어요.","그는 + 첫 번째 사람이었어요 + 우리를 도와준","He was the first person that helped us.|He was the first person who helped us.","the first ~ that"],
["그녀가 말한 모든 것은 사실이었어요.","모든 것은 + 그녀가 말한 + 사실이었어요","Everything that she said was true.|Everything she said was true.","everything that"]]);
UU("L3-4-3","소유격 whose",
"'아버지가 의사인 친구'처럼 소유 관계로 꾸밀 땐 whose! 사람도 사물도 OK.",
[["나는 아버지가 의사인 친구가 있어요.","나는 가지고 있어요 + 친구를 + 그의 아버지가 의사인","I have a friend whose father is a doctor.","whose + 명사"],
["지붕이 빨간 저 집이 우리 집이에요.","저 집이 + 지붕이 빨간 + 우리 집이에요","The house whose roof is red is ours.|The house whose roof is red is our house.","whose roof"],
["그녀는 이름이 기억나지 않는 가수를 좋아해요.","그녀는 좋아해요 + 가수를 + 그의 이름이 기억나지 않는","She likes a singer whose name I can't remember.|She likes a singer whose name I cannot remember.","whose name"]]);
UU("L3-4-4","계속적 용법",
"콤마 + which/who로 부연 설명을 슬쩍! 제한이 아니라 '덧붙이는' 관계사절이에요.",
[["나는 어제 민호를 만났는데, 그는 내 오랜 친구예요.","나는 만났어요 + 민호를 + 어제 + 그런데 그는 + 내 오랜 친구예요","I met Minho yesterday, who is an old friend of mine.|Yesterday I met Minho, who is an old friend of mine.",", who"],
["우리는 경주를 방문했는데, 그곳은 역사적인 도시예요.","우리는 방문했어요 + 경주를 + 그런데 그곳은 + 역사적인 도시예요","We visited Gyeongju, which is a historic city.|We visited Gyeongju, which is a historical city.",", which"],
["그 책은, 내가 두 번 읽었는데, 여전히 흥미로워요.","그 책은 + 내가 두 번 읽었는데 + 여전히 흥미로워요","The book, which I have read twice, is still interesting.|The book, which I read twice, is still interesting.","콤마 사이 삽입"]]);
UU("L3-4-5","앞 문장 전체를 받는 which",
"콤마 + which가 앞 문장 전체를 받는다! '그런데 그것이 ~했다'를 한 번에 표현해요.",
[["그는 약속을 지켰는데, 그것이 모두를 놀라게 했어요.","그는 지켰어요 + 약속을 + 그런데 그것이 + 놀라게 했어요 + 모두를","He kept his promise, which surprised everyone.|He kept his promise, which surprised everybody.",", which = 앞 문장"],
["비가 갑자기 그쳤는데, 그것은 우리에게 행운이었어요.","비가 그쳤어요 + 갑자기 + 그런데 그것은 + 행운이었어요 + 우리에게","The rain suddenly stopped, which was lucky for us.|The rain stopped suddenly, which was lucky for us.","which was lucky"],
["그녀는 시험에 합격했는데, 그것이 부모님을 기쁘게 했어요.","그녀는 합격했어요 + 시험에 + 그런데 그것이 + 기쁘게 했어요 + 부모님을","She passed the exam, which made her parents happy.|She passed the test, which made her parents happy.","which made"]]);

CH(3, "복합관계사");
UU("L3-5-1","whoever/whatever 명사절",
"'~하는 사람은 누구든', '~하는 것은 무엇이든' — 복합관계사로 폭넓은 주어·목적어를 만들어요.",
[["먼저 끝내는 사람이 누구든 상을 받아요.","먼저 끝내는 사람은 누구든 + 받아요 + 상을","Whoever finishes first gets a prize.|Whoever finishes the work first gets a prize.","Whoever = 주어"],
["원하는 것은 무엇이든 주문해도 돼.","너는 주문해도 돼 + 네가 원하는 것은 무엇이든","You can order whatever you want.|Order whatever you want.","whatever you want"],
["네가 더 좋아하는 것은 어느 쪽이든 골라.","골라 + 네가 더 좋아하는 것은 어느 쪽이든","Choose whichever you like better.|Pick whichever you prefer.","whichever"]]);
UU("L3-5-2","복합관계사 양보절",
"'누가 뭐래도', '무슨 일이 있어도' — 복합관계사로 흔들리지 않는 의지를 표현해요!",
[["사람들이 뭐라고 말하든 나는 내 길을 갈 거예요.","사람들이 뭐라고 말하든 + 나는 갈 거예요 + 내 길을","Whatever people say, I will go my own way.|Whatever people say, I'll go my way.","Whatever ~, 주어+동사"],
["네가 누구를 선택하든 나는 너를 지지할게.","네가 누구를 선택하든 + 나는 지지할게 + 너를","Whoever you choose, I will support you.|Whoever you choose, I'll support you.","Whoever you choose"],
["네가 어디에 가든 나는 너를 찾을 거야.","네가 어디에 가든 + 나는 찾을 거야 + 너를","Wherever you go, I will find you.|Wherever you go, I'll find you.","Wherever you go"]]);
UU("L3-5-3","no matter + 의문사",
"no matter how, no matter what — '아무리 ~해도'를 강조하는 단단한 표현!",
[["아무리 바빠도 그는 매일 운동해요.","아무리 그가 바빠도 + 그는 운동해요 + 매일","No matter how busy he is, he exercises every day.|No matter how busy he is, he works out every day.","No matter how + 형"],
["무슨 일이 있어도 나는 너를 응원할 거야.","무슨 일이 있어도 + 나는 응원할 거야 + 너를","No matter what happens, I will support you.|No matter what happens, I'll cheer for you.","No matter what"],
["아무리 열심히 해도 실패할 수도 있어요.","아무리 네가 열심히 해도 + 너는 실패할 수도 있어","No matter how hard you try, you might still fail.|Even if you work hard, you might still fail.","No matter how hard"]]);
UU("L3-5-4","however + 형용사/부사",
"however small, however far — however 뒤에 형용사를 바로 붙이는 압축 표현!",
[["아무리 작은 진전이라도 진전은 진전이에요.","아무리 작아도 + 진전은 + 진전이에요","However small it is, progress is progress.|However small, progress is progress.","However + 형용사"],
["아무리 멀어도 우리는 거기에 갈 거예요.","아무리 멀어도 + 우리는 갈 거예요 + 거기에","However far it is, we will go there.|However far it is, we'll get there.","However far"],
["가능할 때마다 영어로 생각해 보세요.","생각해 보세요 + 영어로 + 가능할 때마다","Think in English whenever possible.|Try to think in English whenever possible.","whenever possible"]]);

CH(3, "분사구문 고급");
UU("L3-6-1","완료 분사구문",
"Having p.p.로 '~하고 나서'의 시간차를! 분사구문에 시제를 입히는 마지막 단계예요.",
[["저녁을 다 먹고 나서 우리는 산책하러 나갔어요.","저녁을 다 먹고 나서 + 우리는 나갔어요 + 산책하러","Having finished dinner, we went out for a walk.|Having eaten dinner, we went out for a walk.","Having p.p."],
["그 도시에 살아 봤기 때문에 그는 길을 잘 알아요.","그 도시에 살아 봤기 때문에 + 그는 알아요 + 길을 + 잘","Having lived in the city, he knows the streets well.|Having lived in that city, he knows his way around.","Having lived"],
["전에 그 책을 읽어서 나는 토론에 참여할 수 있었어요.","전에 그 책을 읽어서 + 나는 참여할 수 있었어요 + 토론에","Having read the book before, I was able to join the discussion.|Having read the book before, I could join the discussion.","Having read"]]);
UU("L3-6-2","수동·접속사 분사구문",
"Though tired, While boiling처럼 접속사를 남긴 분사구문! 뜻을 더 분명하게 전해요.",
[["피곤했지만 나는 숙제를 끝냈어요.","피곤했지만 + 나는 끝냈어요 + 숙제를","Though tired, I finished my homework.|Although tired, I finished my homework.","Though + 형용사"],
["물을 끓이는 동안 그녀는 야채를 썰었어요.","물을 끓이는 동안 + 그녀는 썰었어요 + 야채를","While boiling the water, she chopped the vegetables.|While boiling water, she chopped vegetables.","While + Ving"],
["어디로 갈지 몰라서 우리는 잠시 멈췄어요.","어디로 갈지 몰라서 + 우리는 멈췄어요 + 잠시","Not knowing where to go, we stopped for a moment.|Not knowing where to go, we paused for a moment.","Not knowing"]]);
UU("L3-6-3","with + 명사 + 분사",
"'눈을 감은 채', '팔짱을 낀 채' — with로 동시 상황을 그림처럼 묘사하는 표현!",
[["그녀는 눈을 감은 채 음악을 들었어요.","그녀는 들었어요 + 음악을 + 눈을 감은 채","She listened to music with her eyes closed.","with + 명사 + p.p."],
["그는 팔짱을 낀 채 서 있었어요.","그는 서 있었어요 + 팔짱을 낀 채","He stood with his arms crossed.|He was standing with his arms folded.","with arms crossed"],
["개가 꼬리를 흔들며 나에게 달려왔어요.","개가 달려왔어요 + 나에게 + 꼬리를 흔들며","The dog ran to me with its tail wagging.|The dog came running to me with its tail wagging.","with + 명사 + Ving"]]);

CH(3, "조건절과 가정법");
UU("L3-7-1","실제 조건 vs 가정법",
"일어날 수 있는 일은 현재시제, 현실과 반대인 상상은 가정법 과거! 두 세계를 구분해요.",
[["내일 비가 오면 우리는 경기를 취소할 거예요.","우리는 취소할 거예요 + 경기를 + 내일 비가 오면","If it rains tomorrow, we will cancel the game.|We will cancel the game if it rains tomorrow.","실제 조건 = 현재"],
["내가 새라면 너에게 날아갈 텐데.","내가 새라면 + 나는 날아갈 텐데 + 너에게","If I were a bird, I would fly to you.","상상 = 가정법"],
["시간이 있으면 너를 도와줄게. (가능한 일)","나는 도와줄게 + 너를 + 내가 시간이 있으면","If I have time, I will help you.|I will help you if I have time.","if + 현재, will"]]);
UU("L3-7-2","가정법 과거",
"'내가 너라면', '돈이 많다면' — 현재 사실의 반대는 「If + 과거, would + 동사원형」!",
[["내가 너라면 그 제안을 받아들일 거야.","내가 너라면 + 나는 받아들일 거야 + 그 제안을","If I were you, I would accept the offer.|If I were you, I'd take the offer.","If I were you"],

<script>

/* ---- 날짜 (Asia/Seoul) ---- */
function seoulDate(offsetDays=0){
  const now = new Date(Date.now() + offsetDays*86400000);
  return new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Seoul'}).format(now); // YYYY-MM-DD
}
function seoulDayLabel(offsetDays=0){
  const now = new Date(Date.now() + offsetDays*86400000);
  return new Intl.DateTimeFormat('ko-KR',{timeZone:'Asia/Seoul',weekday:'short'}).format(now);
}

/* ---- 채점: 유연한 정규화 ---- */
function normalize(s){
  let t = (s||"").toLowerCase().trim();
  const con = {"i'm":"i am","you're":"you are","he's":"he is","she's":"she is","it's":"it is",
    "we're":"we are","they're":"they are","isn't":"is not","aren't":"are not","wasn't":"was not",
    "weren't":"were not","don't":"do not","doesn't":"does not","didn't":"did not","can't":"cannot",
    "couldn't":"could not","won't":"will not","wouldn't":"would not","shouldn't":"should not",
    "hasn't":"has not","haven't":"have not","hadn't":"had not","i'll":"i will","you'll":"you will",
    "he'll":"he will","she'll":"she will","we'll":"we will","they'll":"they will","it'll":"it will",
    "i've":"i have","you've":"you have","we've":"we have","they've":"they have",
    "i'd":"i would","you'd":"you would","he'd":"he would","she'd":"she would","we'd":"we would","they'd":"they would",
    "let's":"let us","that's":"that is","there's":"there is","here's":"here is","what's":"what is",
    "who's":"who is","where's":"where is","how's":"how is","mustn't":"must not"};
  t = t.replace(/[’']/g,"'");
  Object.keys(con).forEach(k=>{ t = t.split(k).join(con[k]); });
  t = t.replace(/[.,!?;:"()]/g," ").replace(/\s+/g," ").trim();
  return t;
}
function checkAnswer(input, answerStr){
  const user = normalize(input);
  if(!user) return {result:"empty"};
  const answers = answerStr.split("|").map(normalize);
  if(answers.includes(user)) return {result:"correct"};
  // 어순만 다른가?
  const uw = user.split(" ").sort().join(" ");
  for(const a of answers){
    if(a.split(" ").sort().join(" ") === uw) return {result:"order", model:answerStr.split("|")[0]};
  }
  // 한 단어 차이 분석 (피드백 한 가지)
  const a0 = answers[0].split(" "), u0 = user.split(" ");
  const missing = a0.filter(w=>!u0.includes(w));
  const extra = u0.filter(w=>!a0.includes(w));
  return {result:"wrong", model:answerStr.split("|")[0], missing, extra};
}
function feedbackMsg(chk, hint){
  if(chk.result==="correct"){
    const cheers = ["정확해요! 뼈대가 단단하게 섰어요.","좋아요, 바로 그 어순이에요!","완벽해요. 이 감각을 기억하세요!","훌륭해요! 문장이 한 번에 끓어올랐어요."];
    return {cls:"good", html:"✅ " + cheers[Math.floor(Math.random()*cheers.length)]};
  }
  if(chk.result==="order"){
    return {cls:"fix", html:"🧩 단어는 모두 맞아요! 다만 <b>어순</b>만 다듬으면 돼요. 영어는 뼈대(주어+서술어)를 먼저 세우고 나머지를 뒤에 붙여요.<span class='model'>"+chk.model+"</span>"};
  }
  let one = "";
  if(chk.missing && chk.missing.length) one = "빠진 조각이 있어요: <b>"+chk.missing[0]+"</b> — 이 단어를 어디에 넣을지 생각해 보세요.";
  else if(chk.extra && chk.extra.length) one = "<b>"+chk.extra[0]+"</b>는 이 문장에 필요하지 않아요. 한 번 빼고 다시 읽어 보세요.";
  else one = "거의 다 왔어요. 힌트를 다시 확인해 보세요" + (hint? " — <b>"+hint+"</b>":"") + ".";
  return {cls:"fix", html:"💡 " + one + "<span class='model'>"+chk.model+"</span>"};
}

const $ = id => document.getElementById(id);
const VIEWS = ["view-login","view-setup","view-home","view-unit","view-exam","view-break"];
function show(view){
  VIEWS.forEach(v=>$(v).classList.add("hidden"));

  $("app-header").classList.toggle("hidden", view==="view-login");
  window.scrollTo(0,0);
}

/* ---- 커리큘럼 헬퍼 ---- */
function unitsOfLevel(lv){ return CURRICULUM.filter(u=>u.lv===lv); }
function unitById(id){ return CURRICULUM.find(u=>u.id===id); }
function firstUndone(lv, done){
  return unitsOfLevel(lv).find(u=>!done[u.id]) || null;
}
function levelProgress(lv, done){
  const us = unitsOfLevel(lv);
  const d = us.filter(u=>done[u.id]).length;
  return {done:d, total:us.length, pct: Math.round(d/us.length*100)};
}

const App = {};

  auth.signInWithPopup(provider).catch(e=>{ $("login-msg").textContent = "로그인 실패: " + e.message; });
};
App.signOut = function(){ auth.signOut(); };

  if(!user){ ME=null; show("view-login"); return; }
  if(!ALLOWED.includes(user.email)){
    $("login-msg").textContent = "등록되지 않은 계정이에요 ("+user.email+"). 준킴쌤에게 등록을 요청하세요.";
    auth.signOut(); return;
  }
  const ref = db.collection("users").doc(user.uid);
  const snap = await ref.get();
  if(!snap.exists){
    const fi = famInfo(user.email);
    const doc = {
      email: user.email,
      name: fi ? fi.name : (isTeacher(user.email) ? "준킴쌤" : user.displayName||"학생"),
      grade: fi ? fi.grade : null,
      role: isTeacher(user.email) ? "teacher" : "student",
      level: null, placed: false, done: {}, exams: [],
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    await ref.set(doc);
    ME = Object.assign({uid:user.uid}, doc);
  } else {
    ME = Object.assign({uid:user.uid}, snap.data());
  }
  $("hdr-name").textContent = ME.name + (ME.level? " · L"+ME.level : "");
  if(!ME.placed) show("view-setup");
  else renderHome();
});
async function saveMe(patch){
  Object.assign(ME, patch);
  await db.collection("users").doc(ME.uid).update(patch);
  $("hdr-name").textContent = ME.name + (ME.level? " · L"+ME.level : "");
}
async function logToday(unitId){
  const date = seoulDate();
  const ref = db.collection("logs").doc(ME.uid + "_" + date);
  await ref.set({
    uid: ME.uid, email: ME.email, name: ME.name, date,
    units: firebase.firestore.FieldValue.arrayUnion(unitId),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  },{merge:true});
}

/* ============ 배치고사 ============ */
App.startPlacement = function(){
  placementState = { i:0, answers:[], scoreByLv:{1:0,2:0,3:0} };
  renderExamQ(PLACEMENT[0], 0, PLACEMENT.length, "PLACEMENT · 배치고사", App.submitPlacement, true);
  show("view-exam");
};
function renderExamQ(q, idx, total, label, onSubmit, allowSkip){
  $("view-exam").innerHTML = `
    <div class="card">
      <div class="exam-head"><span>${label}</span><span>${idx+1} / ${total}</span></div>
      <div class="kr-sent">${q.ko}</div>
      <div class="frame" id="ex-frame">${frameHTML(q.st)}</div>
      <div class="hintline" id="ex-hint">힌트: ${q.hint}</div>
      <div class="ans-row">
        <input id="ex-input" autocomplete="off" placeholder="영어로 문장을 만들어 보세요" onkeydown="if(event.key==='Enter')App._exGo()">
        <button class="btn" onclick="App._exGo()">확인</button>
      </div>
      <div class="toolbar">
        <button class="btn ghost small" onclick="document.getElementById('ex-frame').classList.toggle('show')">어순 구조 보기</button>
        <button class="btn ghost small" onclick="document.getElementById('ex-hint').classList.toggle('show')">힌트</button>
        ${allowSkip? `<button class="btn ghost small" onclick="App._exGo(true)">모르겠어요, 넘어갈게요</button>`:""}
      </div>
    </div>`;
  App._exGo = (skip)=> onSubmit(skip? "" : $("ex-input").value);
  setTimeout(()=>$("ex-input").focus(),50);
}
function frameHTML(st){
  return st.split(" + ").map((b,i)=>
    (i? "<span class='fplus'>+</span>":"") + `<span class="fblock ${i===0?'skel':'add'}">${b}</span>`
  ).join("");
}
App.submitPlacement = function(val){
  const q = PLACEMENT[placementState.i];
  const chk = checkAnswer(val, q.a);
  if(chk.result==="correct") placementState.scoreByLv[q.lv]++;
  placementState.i++;
  if(placementState.i < PLACEMENT.length){
    renderExamQ(PLACEMENT[placementState.i], placementState.i, PLACEMENT.length, "PLACEMENT · 배치고사", App.submitPlacement, true);
  } else finishPlacement();
};
async function finishPlacement(){
  const s = placementState.scoreByLv;
  let level = 1;
  if(s[1] >= RULES.placePass){ level = 2; if(s[2] >= RULES.placePass) level = 3; }
  await saveMe({level, placed:true});
  $("view-exam").innerHTML = `
    <div class="card breakthru">
      <div class="eyebrow">PLACEMENT RESULT</div>
      <div class="deg-big">L${level}</div>
      <h1>${LEVELS[level-1].name}부터 시작해요!</h1>
      <p class="muted" style="margin:14px 0 6px">레벨1 ${s[1]}/3 · 레벨2 ${s[2]}/3 · 레벨3 ${s[3]}/3 정답</p>
      <p class="muted">${LEVELS[level-1].goal}</p>
      <div style="margin-top:22px"><button class="btn heat" onclick="renderHome()">훈련 시작하기</button></div>
    </div>`;
}

async function renderHome(){
  show("view-home");
  const lv = ME.level || 1;
  const prog = levelProgress(lv, ME.done||{});
  const next = firstUndone(lv, ME.done||{});

      <div class="goal-row">
        <div><strong class="goal-amt">${goalU}유닛 · ${goalSent}문장</strong>

        <div class="unit-dots">${goalDots}</div>
      </div>
      <div class="goal-status ${metGoal?'met':''}">${metGoal
        ? `오늘 목표 달성! 🔥 (${todayCount}유닛 완료) 더 하고 싶으면 계속 가도 좋아요.`
        : `오늘 ${todayCount}/${goalU}유닛 완료 — ${goalU-todayCount}유닛만 더 하면 오늘 몫 끝!`}</div>
    </div>`;

  let todayCard;

    todayCard = `
    <div class="card today-unit">
      <div class="eyebrow">CRITICAL POINT · 임계점 도전</div>

      <p class="muted">이제 임계점 돌파 시험에 도전하세요. 이 레벨 전체에서 무작위로 ${RULES.examCount}문장이 나오고, ${RULES.examPass}문장 이상 맞히면 ${lv<3? "다음 레벨로 승급해요." : "최종 임계점을 돌파해요!"}</p>
      <div style="margin-top:14px"><button class="btn heat" onclick="App.startExam()">임계점 돌파 시험 시작</button></div>
    </div>`;
  } else {
    todayCard = `
    <div class="card today-unit">
      <div class="eyebrow">TODAY · 오늘의 유닛</div>
      <div class="uno">${next.id}</div>
      <h2>${next.t}</h2>
      <p class="muted">${next.p}</p>
      <div style="margin-top:14px"><button class="btn" onclick="App.startUnit('${next.id}')">오늘의 문장 만들기 (3문장)</button></div>
    </div>`;
  }

  const ticks = [25,50,75].map(p=>`<span class="tick" style="left:${p}%"></span>`).join("");
  const gauge = `
    <div class="card">
      <div class="eyebrow">LEVEL ${lv} · ${lvMeta.name}</div>
      <div class="gauge">
        <div class="tube">${ticks}<div class="mercury" id="mercury"></div></div>
        <div class="deg"><em>${prog.pct}°</em>/100°</div>
      </div>
      <div class="gauge-note">${prog.done} / ${prog.total} 유닛 완료 — 100°가 되면 임계점 돌파 시험이 열려요. ${lvMeta.goal}</div>
    </div>`;

  const chapters = lvMeta.chapters.map(ch=>{
    const dn = ch.units.filter(id=>(ME.done||{})[id]).length;
    const dots = ch.units.map((id,i)=>{
      const cls = (ME.done||{})[id] ? "done" : (next && id===next.id ? "cur" : "");
      return `<span class="udot ${cls}" title="${unitById(id).t}" onclick="App.startUnit('${id}')">${i+1}</span>`;
    }).join("");
    return `<div class="ch-row"><div class="ch-name"><span>${ch.name}</span><span class="cnt">${dn}/${ch.units.length}</span></div><div class="unit-dots">${dots}</div></div>`;

window.renderHome = renderHome;

async function renderFamilyBoard(){
  const days = [-6,-5,-4,-3,-2,-1,0];
  const dates = days.map(d=>seoulDate(d));
  let logs = [];
  try{
    const qs = await db.collection("logs").where("date","in",dates.slice(-7)).get();
    logs = qs.docs.map(d=>d.data());
  }catch(e){ /* index 미생성 등 */ 
    try{
      const qs = await db.collection("logs").where("date",">=",dates[0]).get();
      logs = qs.docs.map(d=>d.data());
    }catch(e2){}
  }
  let users = [];
  try{
    const us = await db.collection("users").where("role","==","student").get();
    users = us.docs.map(d=>Object.assign({uid:d.id}, d.data()));
  }catch(e){ users = [ME]; }
  // FAMILY 순서대로 정렬
  users.sort((a,b)=>FAMILY.findIndex(f=>f.email===a.email)-FAMILY.findIndex(f=>f.email===b.email));
  if(!users.length) users=[ME];

  const head = `<div></div>` + dates.map((d,i)=>`<div class="dayhead">${seoulDayLabel(days[i])}<br>${d.slice(5)}</div>`).join("");
  const rows = users.map(u=>{
    const goal = dailyUnitGoal(u.grade);
    const todayLog = logs.find(l=>l.email===u.email && l.date===dates[6]);
    const todayN = todayLog ? (todayLog.units||[]).length : 0;
    const goalMet = todayN >= goal;
    const cells = dates.map((d,i)=>{
      const lg = logs.find(l=>l.email===u.email && l.date===d);
      const n = lg ? (lg.units||[]).length : 0;
      const isToday = i===6;
      const met = n >= dailyUnitGoal(u.grade);
      const cls = n>0 ? (met? "did met" : "did") : (isToday ? "today-miss" : "");
      return `<div class="bcell ${cls}" title="${n}유닛">${n>0?(met?"🔥":"✓"):(isToday?"·":"")}</div>`;
    }).join("");
    // 스트릭: 오늘부터 거꾸로
    let streak=0;
    for(let i=6;i>=0;i--){
      const lg = logs.find(l=>l.email===u.email && l.date===dates[i]);
      const did = lg && (lg.units||[]).length>0;
      if(did) streak++; else if(i!==6) break; // 오늘 아직 안 했으면 어제까지로 계산
    }
    return `<div class="kidname">${u.name}<br><span class="streak">${streak>0? "🔥"+streak+"일 · ":""}</span><span class="goalbadge ${goalMet?'met':''}">오늘 ${todayN}/${goal}</span></div>` + cells;
  }).join("");

  const todayMissed = users.filter(u=>{
    const lg = logs.find(l=>l.email===u.email && l.date===dates[6]);
    return !lg || (lg.units||[]).length < dailyUnitGoal(u.grade);
  }).map(u=>u.name);
  const cheer = todayMissed.length===0
    ? "오늘은 모두 목표를 채웠어요! 물은 99°에서 멈추지 않아요. 내일도 함께 🔥"
    : `오늘 아직 ${todayMissed.join(", ")} 차례가 남았어요. 각자 오늘 몫만 채우면 돼요 — 서로 한마디 응원해 주세요!`;

  let teacherTable = "";
  if(ME.role==="teacher"){
    teacherTable = `<div class="card"><div class="eyebrow">TEACHER · 상세 현황</div><table class="detail">
      <tr><th>이름</th><th>학년</th><th>레벨</th><th>유닛 진행</th><th>시험</th></tr>` +
      users.map(u=>{
        const p = u.level? levelProgress(u.level, u.done||{}) : {done:0,total:0,pct:0};
        const ex = (u.exams||[]).map(e=>`L${e.level} ${e.score}/${e.total}${e.passed?"✓":"✗"}`).join("<br>")||"-";
        return `<tr><td>${u.name}</td><td>${u.grade||"-"}</td><td>${u.level? "L"+u.level+" ("+p.pct+"°)":"미배치"}</td><td>${p.done}/${p.total}</td><td>${ex}</td></tr>`;
      }).join("") + `</table></div>`;
  }

  $("family-board").innerHTML = `<div class="card">
    <div class="eyebrow">FAMILY · 이번 주 함께 끓이기</div>
    <div class="board-week">${head}${rows}</div>
    <div class="cheer">${cheer}</div>
  </div>` + teacherTable;
}

  unitState = { unit:u, i:0, results:[] };
  show("view-unit");
  renderUnitIntro();
};
function renderUnitIntro(){
  const u = unitState.unit;
  $("view-unit").innerHTML = `
    <button class="backlink" onclick="renderHome()">← 홈으로</button>
    <div class="card">
      <span class="tag">${u.id}</span><span class="tag">LEVEL ${u.lv}</span>

window.renderUnitQ = function(){
  const u = unitState.unit, i = unitState.i;
  const [ko, st, ans, hint] = u.s[i];
  const pips = u.s.map((_,k)=>{
    let c = ""; if(k<i) c = unitState.results[k]? "right":"wrong"; else if(k===i) c="cur";
    return `<span class="pip ${c}"></span>`;
  }).join("");
  $("view-unit").innerHTML = `
    <button class="backlink" onclick="renderHome()">← 홈으로</button>
    <div class="card">
      <div class="progress-pips">${pips}</div>
      <span class="tag">${u.id} · ${i+1}/3</span>
      <div class="kr-sent">${ko}</div>
      <div class="frame" id="u-frame">${frameHTML(st)}</div>
      <div class="hintline" id="u-hint">힌트: ${hint}</div>
      <div class="ans-row">
        <input id="u-input" autocomplete="off" placeholder="영어로 문장을 만들어 보세요" onkeydown="if(event.key==='Enter')App.checkUnit()">
        <button class="btn" id="u-check" onclick="App.checkUnit()">확인</button>
      </div>
      <div class="toolbar">
        <button class="btn ghost small" onclick="document.getElementById('u-frame').classList.toggle('show')">어순 구조 보기</button>
        <button class="btn ghost small" onclick="document.getElementById('u-hint').classList.toggle('show')">힌트</button>
      </div>
      <div class="feedback" id="u-fb"></div>
      <div class="toolbar hidden" id="u-next"><button class="btn" onclick="App.nextSentence()">다음 →</button></div>
    </div>`;
  setTimeout(()=>$("u-input").focus(),50);
};
App.checkUnit = function(){
  const u = unitState.unit, i = unitState.i;
  const [ko, st, ans, hint] = u.s[i];
  const chk = checkAnswer($("u-input").value, ans);
  if(chk.result==="empty"){ $("u-input").placeholder="한 단어라도 좋아요, 뼈대부터 적어 보세요!"; return; }
  const fb = feedbackMsg(chk, hint);
  const el = $("u-fb"); el.className = "feedback show " + fb.cls; el.innerHTML = fb.html;
  if(chk.result==="correct"){
    unitState.results[i] = true;
    $("u-check").disabled = true; $("u-input").disabled = true;
    $("u-next").classList.remove("hidden");
  } else {
    // 두 번째 시도까지 허용, 그 다음엔 오답 처리하고 진행
    if(unitState["try"+i]){ unitState.results[i] = false; $("u-check").disabled=true; $("u-input").disabled=true; $("u-next").classList.remove("hidden"); }
    else { unitState["try"+i] = true; $("u-input").select(); }
  }
};
App.nextSentence = async function(){
  unitState.i++;
  if(unitState.i < 3){ renderUnitQ(); return; }
  const correct = unitState.results.filter(Boolean).length;
  const passed = correct >= RULES.unitPass;
  if(passed){
    const done = Object.assign({}, ME.done||{}); done[unitState.unit.id] = true;
    await saveMe({done});
    await logToday(unitState.unit.id);
  }
  $("view-unit").innerHTML = `
    <div class="card breakthru">
      <div class="eyebrow">UNIT RESULT</div>
      <div class="deg-big">${passed? "+"+Math.round(100/unitsOfLevel(unitState.unit.lv).length)+"°" : correct+"/3"}</div>
      <h1>${passed? "유닛 통과! 온도가 올랐어요 🔥" : "아직 끓지 않았어요 — 다시 한번!"}</h1>
      <p class="muted" style="margin-top:10px">${passed? "오늘의 훈련이 가족 보드에 기록됐어요." : "괜찮아요. 임계점 전의 1°는 눈에 안 보여도 쌓이고 있어요. 같은 유닛을 한 번 더 연습해 봐요."}</p>
      <div style="margin-top:20px">
        ${passed? `<button class="btn" onclick="renderHome()">홈으로</button>` :
          `<button class="btn heat" onclick="App.startUnit('${unitState.unit.id}')">다시 도전</button>
           <button class="btn ghost" onclick="renderHome()">홈으로</button>`}
      </div>
    </div>`;
};

/* ============ 임계점 돌파 시험 ============ */
App.startExam = function(){
  const lv = ME.level;
  const pool = [];
  unitsOfLevel(lv).forEach(u=>u.s.forEach(s=>pool.push({u, s})));
  // 유닛이 겹치지 않게 무작위 추출
  const byUnit = {}; pool.forEach(p=>{ (byUnit[p.u.id]=byUnit[p.u.id]||[]).push(p); });
  const unitIds = Object.keys(byUnit).sort(()=>Math.random()-.5).slice(0, RULES.examCount);
  const qs = unitIds.map(id=>{
    const arr = byUnit[id]; const p = arr[Math.floor(Math.random()*arr.length)];
    return { ko:p.s[0], st:p.s[1], a:p.s[2], hint:p.s[3] };
  });
  examState = { lv, qs, i:0, score:0 };
  renderExamQ(qs[0], 0, qs.length, "CRITICAL POINT EXAM · L"+lv+" 임계점 돌파", App.submitExam, false);
  show("view-exam");
};
App.submitExam = function(val){
  const q = examState.qs[examState.i];
  if(checkAnswer(val, q.a).result==="correct") examState.score++;
  examState.i++;
  if(examState.i < examState.qs.length){
    renderExamQ(examState.qs[examState.i], examState.i, examState.qs.length, "CRITICAL POINT EXAM · L"+examState.lv+" 임계점 돌파", App.submitExam, false);
  } else finishExam();
};
async function finishExam(){
  const passed = examState.score >= RULES.examPass;
  const exams = (ME.exams||[]).concat([{level:examState.lv, score:examState.score, total:examState.qs.length, passed, date:seoulDate()}]);
  const patch = {exams};
  if(passed && examState.lv < 3) patch.level = examState.lv + 1;
  if(passed && examState.lv === 3) patch.finished = true;
  await saveMe(patch);
  if(passed) renderBreak(examState.lv, examState.score);
  else {
    $("view-exam").innerHTML = `
      <div class="card breakthru">
        <div class="eyebrow">EXAM RESULT</div>
        <div class="deg-big">${examState.score}/${examState.qs.length}</div>
        <h1>99° — 정말 아깝게 멈췄어요</h1>
        <p class="muted" style="margin-top:10px">통과 기준은 ${RULES.examPass}문장이에요. 물은 99°에서도 끓지 않지만, 1°만 더 올리면 돼요. 헷갈렸던 유닛을 다시 연습하고 언제든 재도전하세요!</p>
        <div style="margin-top:20px"><button class="btn" onclick="renderHome()">홈으로</button></div>
      </div>`;
  }
}
function renderBreak(lv, score){
  show("view-break");
  let nextMsg;
  if(lv < 3){
    nextMsg = `<p class="muted" style="margin-top:10px">이제 <b>${LEVELS[lv].name}</b>이 열렸어요. ${LEVELS[lv].goal}</p>
      <div style="margin-top:22px"><button class="btn heat" onclick="renderHome()">레벨 ${lv+1} 시작하기</button></div>`;
  } else {
    nextMsg = `<p class="muted" style="margin-top:10px">3차 임계점까지 모두 돌파했어요! 이제 문장 만들기의 근육이 충분히 붙었으니, 다음 단계로 나아갈 시간이에요.</p>
      <div class="card" style="text-align:left;margin-top:20px">
        <h2>다음 여정 🗺️</h2>
        <p class="muted" style="margin-top:8px">
        <b>1단계 — 듀오링고 영어 시험(DET)</b>: 컴퓨터로 약 1시간 만에 보는 공인 영어 시험이에요. 지금까지 훈련한 문장 만들기 실력을 객관적인 점수로 확인해 보세요. 준킴쌤과 응시 날짜를 정하세요.<br><br>
        <b>2단계 — AP 시험 준비</b>: DET 결과를 바탕으로 AP English 등 과목별 준비 프로그램으로 연계해요. 여기서 만든 뼈대 문장 실력이 에세이 작문의 기초가 됩니다.
        </p>
      </div>
      <div style="margin-top:14px"><button class="btn" onclick="renderHome()">홈으로</button></div>`;
  }
  $("view-break").innerHTML = `
    <div class="card breakthru">
      <div class="eyebrow">BREAKTHROUGH</div>
      <div class="deg-big">100°</div>
      <h1>${LEVELS[lv-1].name} 돌파! (${score}/${RULES.examCount})</h1>
      ${nextMsg}
    </div>`;
}
</script>
</body>
</html>
