<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>임계점 — 영어로 문장 만들기 훈련</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F5F7FB; --card:#FFFFFF; --ink:#16306B; --ink2:#4A5C85;
  --blue:#2B5CE6; --blue-soft:#E5ECFD; --line:#D8E0F0;
  --heat:#E4572E; --heat-soft:#FCEAE3;
  --ok:#3E7C57; --ok-soft:#E4F1E9;
  --warn:#B7791F; --warn-soft:#FBF1DD;
  --mono:'JetBrains Mono',monospace; --disp:'Space Grotesk','Pretendard',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{
  font-family:'Pretendard',sans-serif;color:var(--ink);background:var(--paper);
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:32px 32px;background-position:-1px -1px;min-height:100vh;
}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}
.wrap{max-width:880px;margin:0 auto;padding:20px 16px 80px}
.hidden{display:none!important}

/* ===== 헤더 ===== */
header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 0 18px;border-bottom:2px solid var(--ink);margin-bottom:20px}
.logo{display:flex;align-items:baseline;gap:10px}
.logo .mark{font-family:var(--disp);font-weight:700;font-size:1.45rem;letter-spacing:-.02em}
.logo .mark .deg{color:var(--heat)}
.logo .sub{font-size:.78rem;color:var(--ink2)}
.userchip{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--ink2)}
.userchip button{background:none;border:1px solid var(--line);border-radius:4px;padding:4px 10px;font-size:.78rem;color:var(--ink2)}

/* ===== 공통 카드 ===== */
.card{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:20px;margin-bottom:16px;box-shadow:0 1px 0 rgba(22,48,107,.05)}
.eyebrow{font-family:var(--mono);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--blue);margin-bottom:6px}
h1{font-size:1.5rem;line-height:1.3;letter-spacing:-.01em}
h2{font-size:1.15rem;margin-bottom:8px}
.muted{color:var(--ink2);font-size:.9rem;line-height:1.65}
.btn{display:inline-block;background:var(--blue);color:#fff;border:none;border-radius:6px;padding:12px 22px;font-size:.95rem;font-weight:600}
.btn:disabled{opacity:.4;cursor:default}
.btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.btn.heat{background:var(--heat)}
.btn.small{padding:7px 14px;font-size:.82rem}

/* ===== 로그인 ===== */
#view-login{max-width:480px;margin:8vh auto 0;text-align:center}
#view-login .bigmark{font-family:var(--disp);font-weight:700;font-size:3rem;letter-spacing:-.03em;margin:10px 0 4px}
#view-login .bigmark .deg{color:var(--heat)}
#view-login p{margin:14px 0 24px}

/* ===== 임계점 게이지 (시그니처) ===== */
.gauge{display:flex;align-items:center;gap:16px;margin:14px 0 4px}
.gauge .tube{flex:1;height:18px;border:1.5px solid var(--ink);border-radius:10px;background:#fff;position:relative;overflow:hidden}
.gauge .mercury{position:absolute;inset:0;width:0%;background:linear-gradient(90deg,var(--blue),var(--heat));transition:width .8s ease}
.gauge .tick{position:absolute;top:-1px;bottom:-1px;width:1.5px;background:var(--ink);opacity:.25}
.gauge .deg{font-family:var(--disp);font-weight:700;font-size:1.5rem;min-width:84px;text-align:right}
.gauge .deg em{font-style:normal;color:var(--heat)}
.gauge-note{font-size:.78rem;color:var(--ink2)}

/* ===== 홈 ===== */
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:680px){.home-grid{grid-template-columns:1fr}}
.today-unit{border-left:4px solid var(--blue)}
.today-unit .uno{font-family:var(--mono);font-size:.75rem;color:var(--ink2);margin-bottom:4px}
.chapterlist{margin-top:10px}
.ch-row{padding:10px 0;border-bottom:1px dashed var(--line)}
.ch-row:last-child{border:none}
.ch-name{font-size:.88rem;font-weight:600;display:flex;justify-content:space-between;gap:8px}
.ch-name .cnt{font-family:var(--mono);font-size:.72rem;color:var(--ink2);font-weight:400}
.unit-dots{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.udot{width:22px;height:22px;border-radius:4px;border:1px solid var(--line);background:#fff;font-size:.6rem;font-family:var(--mono);color:var(--ink2);display:flex;align-items:center;justify-content:center;cursor:pointer}
.udot.done{background:var(--blue);border-color:var(--blue);color:#fff}
.udot.cur{border:2px solid var(--heat);color:var(--heat);font-weight:700}

/* ===== 오늘의 목표 카드 ===== */
.goal-card{border-left:4px solid var(--heat)}
.goal-row{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-top:6px}
.goal-amt{font-family:var(--mono);font-size:1.02rem;color:var(--ink)}
.goal-time{font-size:.78rem;color:var(--ink2);margin-left:8px}
.goal-status{margin-top:12px;font-size:.84rem;color:var(--ink2);background:#f4f7fc;border-radius:8px;padding:9px 12px}
.goal-status.met{color:var(--heat);background:#fdf1ec;font-weight:600}

/* ===== 가족 보드 ===== */
.board-week{display:grid;grid-template-columns:88px repeat(7,1fr);gap:4px;font-size:.72rem;align-items:center;margin-top:10px}
.board-week .dayhead{text-align:center;color:var(--ink2);font-family:var(--mono)}
.board-week .kidname{font-weight:600;font-size:.8rem}
.bcell{height:30px;border:1px solid var(--line);border-radius:4px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:.78rem}
.bcell.did{background:var(--ok-soft);border-color:var(--ok);color:var(--ok);font-weight:700}
.bcell.did.met{background:var(--heat-soft);border-color:var(--heat);color:var(--heat)}
.bcell.today-miss{background:var(--heat-soft)}
.streak{font-family:var(--mono);font-size:.72rem;color:var(--heat)}
.goalbadge{font-family:var(--mono);font-size:.68rem;color:var(--ink2);border:1px solid var(--line);border-radius:4px;padding:1px 5px}
.goalbadge.met{color:var(--heat);border-color:var(--heat);font-weight:700}
.cheer{margin-top:12px;font-size:.85rem;background:var(--blue-soft);border-radius:6px;padding:10px 12px;line-height:1.6}

/* ===== 유닛 플레이어 ===== */
.purpose{background:var(--blue-soft);border:1px solid #C5D4F9;border-radius:6px;padding:14px 16px;margin:12px 0;font-size:.92rem;line-height:1.7}
.purpose b{color:var(--blue)}
.kr-sent{font-size:1.25rem;font-weight:700;line-height:1.5;margin:18px 0 6px}
.frame{margin:10px 0;display:none;flex-wrap:wrap;gap:6px;align-items:center}
.frame.show{display:flex}
.fblock{border-radius:5px;padding:6px 10px;font-size:.9rem;font-weight:600}
.fblock.skel{background:var(--ink);color:#fff}
.fblock.add{background:#fff;border:1.5px dashed var(--blue);color:var(--blue)}
.fplus{color:var(--ink2);font-family:var(--mono)}
.hintline{font-size:.82rem;color:var(--warn);background:var(--warn-soft);border-radius:5px;padding:8px 12px;margin:8px 0;display:none}
.hintline.show{display:block}
.ans-row{display:flex;gap:8px;margin-top:14px}
.ans-row input{flex:1;font-family:var(--mono);font-size:1rem;padding:12px 14px;border:1.5px solid var(--line);border-radius:6px;color:var(--ink)}
.ans-row input:focus{outline:none;border-color:var(--blue)}
.feedback{margin-top:12px;border-radius:6px;padding:12px 14px;font-size:.92rem;line-height:1.65;display:none}
.feedback.show{display:block}
.feedback.good{background:var(--ok-soft);color:var(--ok)}
.feedback.fix{background:var(--warn-soft);color:#7a5310}
.feedback .model{font-family:var(--mono);font-weight:600;color:var(--ink);display:block;margin-top:6px}
.toolbar{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.progress-pips{display:flex;gap:6px;margin-bottom:6px}
.pip{width:34px;height:6px;border-radius:3px;background:var(--line)}
.pip.cur{background:var(--blue)}
.pip.right{background:var(--ok)}
.pip.wrong{background:var(--heat)}

/* ===== 시험 ===== */
.exam-head{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:.78rem;color:var(--ink2);margin-bottom:8px}

/* ===== 돌파 ===== */
.breakthru{text-align:center;padding:48px 20px}
.breakthru .deg-big{font-family:var(--disp);font-weight:700;font-size:4rem;color:var(--heat);animation:boil 1.2s ease}
@keyframes boil{0%{transform:translateY(20px);opacity:0}60%{transform:translateY(-6px)}100%{transform:translateY(0);opacity:1}}
@media(prefers-reduced-motion:reduce){.breakthru .deg-big{animation:none}.gauge .mercury{transition:none}}

.backlink{background:none;border:none;color:var(--ink2);font-size:.85rem;text-decoration:underline;padding:0;margin-bottom:12px}
.tag{display:inline-block;font-family:var(--mono);font-size:.68rem;border:1px solid var(--line);border-radius:3px;padding:2px 7px;color:var(--ink2);margin-right:6px}
table.detail{width:100%;border-collapse:collapse;font-size:.82rem;margin-top:8px}
table.detail th,table.detail td{border-bottom:1px solid var(--line);padding:7px 6px;text-align:left}
table.detail th{font-family:var(--mono);font-size:.7rem;color:var(--ink2);font-weight:400}
</style>
</head>
<body>
<div class="wrap">

<header id="app-header" class="hidden">
  <div class="logo">
    <div class="mark">임계점<span class="deg">°</span></div>
    <div class="sub">영어로 문장 만들기 훈련</div>
  </div>
  <div class="userchip"><span id="hdr-name"></span><button onclick="App.signOut()">로그아웃</button></div>
</header>

<!-- 로그인 -->
<div id="view-login">
  <div class="eyebrow">QUM EDUCLESIA · SENTENCE TRAINING</div>
  <div class="bigmark">임계점<span class="deg">°</span></div>
  <p class="muted">물이 100°C가 되어야 끓듯, 영어 문장도 임계점을 넘어야 터집니다.<br>매일 한 유닛, 손으로 직접 문장을 만들어 보세요.</p>
  <button class="btn" onclick="App.signIn()">Google 계정으로 시작하기</button>
  <p id="login-msg" class="muted" style="margin-top:16px;font-size:.82rem"></p>
</div>

<!-- 첫 설정 + 배치고사 -->
<div id="view-setup" class="hidden">
  <div class="card">
    <div class="eyebrow">PLACEMENT · 배치고사</div>
    <h1 id="setup-title">시작 레벨을 정해 볼까요?</h1>
    <p class="muted" style="margin-top:8px">9문장을 영어로 만들어 보세요. 쉬운 문장부터 점점 어려워져요.<br>모르는 문장은 비워 두고 넘어가도 괜찮아요 — 지금 실력 그대로가 가장 정확한 출발점이에요.</p>
    <div style="margin-top:16px"><button class="btn" onclick="App.startPlacement()">배치고사 시작</button></div>
  </div>
</div>

<!-- 홈 -->
<div id="view-home" class="hidden"></div>

<!-- 유닛 플레이어 -->
<div id="view-unit" class="hidden"></div>

<!-- 시험 (배치/승급 공용) -->
<div id="view-exam" class="hidden"></div>

<!-- 레벨 돌파 -->
<div id="view-break" class="hidden"></div>

</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
/* ============================================================
   ① 설정 — 준킴쌤이 수정하는 곳은 여기뿐입니다
   ============================================================ */
const firebaseConfig = {
  apiKey: "여기에-파이어베이스-API키",
  authDomain: "프로젝트ID.firebaseapp.com",
  projectId: "프로젝트ID",
  storageBucket: "프로젝트ID.appspot.com",
  messagingSenderId: "숫자",
  appId: "앱ID"
};

/* 가족 명단 — 이메일 확정되면 아래 3줄만 바꾸고,
   firestore.rules 파일의 이메일 목록도 똑같이 바꿔 주세요. */
const FAMILY = [
  { email: "child10@example.com", name: "첫째", grade: 10 },
  { email: "child8@example.com",  name: "둘째", grade: 8  },
  { email: "child6@example.com",  name: "셋째", grade: 6  },
];
const TEACHER_EMAILS = ["junkim@example.com"]; // 준킴쌤(관리자)

/* 학년별 하루 기본 연습량. 1유닛 = 3문장.
   아이마다 양을 바꾸고 싶으면 이 표만 손보면 됩니다. */
function dailyUnitGoal(grade){
  if(grade==null) return 2;     // 학년 정보 없으면 기본 2유닛
  if(grade<=6)  return 1;       // ~6학년: 하루 1유닛(3문장)
  if(grade<=9)  return 2;       // 7~9학년: 하루 2유닛(6문장)
  return 3;                     // 10학년 이상: 하루 3유닛(9문장)
}
function goalTimeLabel(grade){
  const u = dailyUnitGoal(grade);
  return u===1 ? "약 10분" : u===2 ? "약 15~20분" : "약 25~30분";
}

/* 승급 기준 */
const RULES = {
  unitPass: 2,        // 유닛 3문장 중 2문장 이상 정답 → 유닛 통과
  examCount: 12,      // 승급 시험 문항 수 (레벨 전체에서 무작위)
  examPass: 10,       // 12문항 중 10문항(약 83%) 이상 → 임계점 돌파
  placeCount: 3,      // 배치고사: 레벨당 3문항
  placePass: 2        // 그 레벨 3문항 중 2문항 이상 → 그 레벨은 이미 통과한 것으로 봄
};
</script>
<script>
/* ============================================================
   ② 커리큘럼 데이터 — 교재 3권의 목차 순서를 그대로 따름
   문장 형식: [한국어, 영어 어순 구조(뼈대 + 덩어리), 정답(|로 복수 허용), 힌트]
   ============================================================ */
const CURRICULUM = [];
let _ch = [];
const LEVELS = [
  {n:1, name:"1차 임계점", goal:"영어 어순의 기초 체력 — 뼈대(주어+서술어)를 먼저 세우고 뒤로 확장하기", chapters:[]},
  {n:2, name:"2차 임계점", goal:"의미를 가르는 시제와 원어민 감각 — 사물 주어, 수동태, 의문문까지", chapters:[]},
  {n:3, name:"3차 임계점", goal:"뉘앙스와 표현력 — 가정법, 관계사, 문장 재구성으로 내 문장 완성", chapters:[]}
];
function CH(lv, name){ _ch = []; LEVELS[lv-1].chapters.push({name, units:_ch}); }
function U(id, t, p, s){ _ch.push(id); CURRICULUM.push({id, lv:LEVELS.length&&CURRICULUM._lv||0, t, p, s}); }
// lv 추적
let _lv = 1;
function LV(n){ _lv = n; }
const _origU = U;
function UU(id, t, p, s){ _ch.push(id); CURRICULUM.push({id, lv:_lv, t, p, s}); }

/* ---------- LEVEL 1 · 1차 임계점 ---------- */
LV(1);
CH(1, "뼈대 문장에서 확장 문장으로");
UU("L1-1-1","뼈대 문장에서 확장 문장으로",
"영어는 아무리 긴 문장도 「누가 + 한다」 뼈대부터 시작해요. 이 훈련은 뼈대를 먼저 박고, 장소·시간·이유를 하나씩 뒤에 붙이는 영어의 기본 어순을 몸에 새기기 위한 거예요.",
[["나는 시험에 대비해서 매일 밤 도서관에서 공부해요.","나는 공부해요 + 도서관에서 + 매일 밤 + 시험에 대비해서","I study in the library every night to prepare for the exam.|I study at the library every night to prepare for the exam.","'~에 대비하다'는 prepare for"],
["그는 건강을 위해 매일 아침 수영해요.","그는 수영해요 + 매일 아침 + 건강을 위해","He swims every morning for his health.","'건강을 위해'는 for his health"],
["우리는 주말마다 교회에서 노래해요.","우리는 노래해요 + 교회에서 + 주말마다","We sing at church every weekend.|We sing in church every weekend.","'주말마다'는 every weekend"]]);
UU("L1-1-2","뼈대 문장에 보충어를 더해 확장 문장으로 1",
"'~이다/하다'만으로 뜻이 안 끝나는 동사(be동사 등)는 뒤에 보충어가 꼭 필요해요. 「누가 + ~이다 + 어떤」 순서를 연습합니다.",
[["내 동생은 아침마다 정말 시끄러워요.","내 동생은 ~이에요 + 정말 시끄러운 + 아침마다","My brother is really noisy in the morning.|My little brother is really noisy in the morning.","'시끄러운'은 noisy"],
["그 수학 문제는 생각보다 쉬웠어요.","그 수학 문제는 ~이었어요 + 더 쉬운 + 내가 생각한 것보다","The math problem was easier than I thought.","'생각보다'는 than I thought"],
["우리 선생님은 항상 친절해요.","우리 선생님은 ~이에요 + 항상 친절한","My teacher is always kind.|Our teacher is always kind.","always는 be동사 뒤에"]]);
UU("L1-1-3","뼈대 문장에 보충어를 더해 확장 문장으로 2",
"become, look, taste처럼 '~해 보인다, ~하게 된다'는 동사도 보충어가 필요해요. 한국어와 순서가 반대인 걸 손으로 익혀요.",
[["그녀는 지난해 의사가 되었어요.","그녀는 되었어요 + 의사가 + 지난해","She became a doctor last year.","become의 과거는 became"],
["이 수프는 약간 짠맛이 나요.","이 수프는 ~한 맛이 나요 + 약간 짠","This soup tastes a little salty.","taste + 형용사"],
["너 오늘 좀 피곤해 보여.","너는 ~해 보여 + 좀 피곤한 + 오늘","You look a little tired today.","look + 형용사"]]);
UU("L1-1-4","뼈대 문장에서 대상어를 더해 확장 문장으로",
"'무엇을' 하는지 말하려면 동사 바로 뒤에 대상어(목적어)를 놓아요. 한국어에선 동사 앞에 있던 것이 영어에선 동사 뒤로 갑니다.",
[["나는 어제 도서관에서 그 책을 빌렸어요.","나는 빌렸어요 + 그 책을 + 도서관에서 + 어제","I borrowed the book from the library yesterday.|I borrowed the book at the library yesterday.","'빌리다'는 borrow"],
["우리는 점심시간에 축구를 해요.","우리는 해요 + 축구를 + 점심시간에","We play soccer at lunchtime.|We play soccer during lunch.","운동 경기는 play"],
["그는 매일 저녁 일기를 써요.","그는 써요 + 일기를 + 매일 저녁","He writes a diary every evening.|He keeps a diary every evening.","'일기'는 a diary"]]);
UU("L1-1-5","뼈대 문장에서 남에게 퍼 주는 문장으로",
"give, make, lend처럼 '누구에게 + 무엇을' 주는 동사는 「동사 + 사람 + 사물」 순서예요. 퍼 주는 문장의 어순을 연습해요.",
[["엄마가 나에게 따뜻한 코코아를 만들어 주셨어요.","엄마가 만들어 주셨어요 + 나에게 + 따뜻한 코코아를","Mom made me hot cocoa.|My mom made me hot cocoa.","make + 사람 + 사물"],
["나는 친구에게 내 공책을 빌려줬어요.","나는 빌려줬어요 + 내 친구에게 + 내 공책을","I lent my friend my notebook.|I lent my notebook to my friend.","lend의 과거는 lent"],
["선생님이 우리에게 숙제를 내 주셨어요.","선생님이 주셨어요 + 우리에게 + 숙제를","The teacher gave us homework.|Our teacher gave us homework.","give + 사람 + 사물"]]);
UU("L1-1-6","뼈대 문장에서 대상어를 명확히 하는 문장으로 1",
"「~를 …하게 만들다/부르다」처럼 대상어 뒤에 설명을 한 번 더 붙이는 문장이에요. 대상어의 상태를 분명히 하는 연습입니다.",
[["그 영화는 나를 행복하게 만들었어요.","그 영화는 만들었어요 + 나를 + 행복하게","The movie made me happy.","make + 대상 + 형용사"],
["우리는 그 강아지를 콩이라고 불러요.","우리는 불러요 + 그 강아지를 + 콩이라고","We call the puppy Kong.|We call the dog Kong.","call A B"],
["나는 창문을 열어 두었어요.","나는 두었어요 + 창문을 + 열린 상태로","I kept the window open.|I left the window open.","keep/leave + 대상 + open"]]);
UU("L1-1-7","뼈대 문장에서 대상어를 명확히 하는 문장으로 2",
"want, tell, ask 뒤에 「사람 + to 동사」를 붙이면 '누가 ~하기를 원한다/말한다'가 돼요. 영어에서 정말 많이 쓰는 뼈대입니다.",
[["엄마는 내가 일찍 자기를 원하세요.","엄마는 원하세요 + 내가 + 일찍 자기를","Mom wants me to go to bed early.|My mom wants me to sleep early.","want + 사람 + to V"],
["선생님은 우리에게 조용히 하라고 말씀하셨어요.","선생님은 말씀하셨어요 + 우리에게 + 조용히 하라고","The teacher told us to be quiet.","tell + 사람 + to V"],
["나는 형에게 나를 도와 달라고 부탁했어요.","나는 부탁했어요 + 형에게 + 나를 도와 달라고","I asked my brother to help me.","ask + 사람 + to V"]]);

CH(1, "시제와 조동사로 문장의 의도를 분명하게");
UU("L1-2-1","현재 시제",
"매일 반복되는 일, 변하지 않는 사실은 현재 시제로 써요. 3인칭 단수 주어 뒤 동사에 -s 붙이는 것까지 손에 익혀요.",
[["우리 가족은 일요일마다 함께 저녁을 먹어요.","우리 가족은 먹어요 + 저녁을 + 함께 + 일요일마다","Our family eats dinner together every Sunday.|My family has dinner together every Sunday.","every Sunday"],
["그 가게는 밤 10시에 문을 닫아요.","그 가게는 닫아요 + 밤 10시에","The store closes at 10 p.m.|The shop closes at ten at night.","3인칭 단수: closes"],
["내 동생은 게임을 정말 좋아해요.","내 동생은 정말 좋아해요 + 게임을","My brother really likes games.|My little brother really likes games.","really + likes"]]);
UU("L1-2-2","과거 시제",
"이미 끝난 일은 과거형으로! 불규칙 동사의 과거형을 문장 속에서 외워 버리는 게 이 훈련의 목적이에요.",
[["우리는 지난 토요일에 박물관에 갔어요.","우리는 갔어요 + 박물관에 + 지난 토요일에","We went to the museum last Saturday.","go의 과거는 went"],
["나는 어젯밤에 숙제를 늦게 끝냈어요.","나는 끝냈어요 + 숙제를 + 늦게 + 어젯밤에","I finished my homework late last night.","finish → finished"],
["그녀는 작년에 피아노를 배웠어요.","그녀는 배웠어요 + 피아노를 + 작년에","She learned the piano last year.|She learned to play the piano last year.","learn → learned"]]);
UU("L1-2-3","미래 시제 1 (will)",
"그 자리에서 결심하거나 단순히 예측할 때는 will을 써요. 「주어 + will + 동사원형」 뼈대를 연습합니다.",
[["내가 내일 너에게 전화할게.","나는 전화할게 + 너에게 + 내일","I will call you tomorrow.|I'll call you tomorrow.","will + 동사원형"],
["그는 다음 주에 열다섯 살이 돼요.","그는 될 거예요 + 열다섯 살이 + 다음 주에","He will turn fifteen next week.|He will be fifteen next week.","나이가 되다: turn"],
["비가 곧 그칠 거예요.","비가 그칠 거예요 + 곧","The rain will stop soon.|It will stop raining soon.","soon은 맨 뒤"]]);
UU("L1-2-4","미래 시제 2 (be going to)",
"이미 마음먹은 계획은 be going to로 말해요. will과의 뉘앙스 차이를 문장으로 구분해 봅니다.",
[["우리는 이번 방학에 캠핑을 갈 거예요.","우리는 갈 거예요 + 캠핑을 + 이번 방학에","We are going to go camping this vacation.|We're going to go camping this vacation.","be going to + 동사원형"],
["나는 오늘 밤에 그 영화를 볼 거예요.","나는 볼 거예요 + 그 영화를 + 오늘 밤에","I am going to watch the movie tonight.|I'm going to watch that movie tonight.","tonight"],
["그녀는 내년에 새 학교로 옮길 거예요.","그녀는 옮길 거예요 + 새 학교로 + 내년에","She is going to move to a new school next year.","move to"]]);
UU("L1-2-5","현재진행 1",
"지금 이 순간 벌어지는 일은 「be + 동사ing」! 눈앞의 장면을 실황 중계하듯 문장으로 만들어요.",
[["아빠는 지금 부엌에서 요리하고 계세요.","아빠는 요리하고 계세요 + 부엌에서 + 지금","Dad is cooking in the kitchen now.|My dad is cooking in the kitchen right now.","be + Ving"],
["아이들이 운동장에서 뛰고 있어요.","아이들이 뛰고 있어요 + 운동장에서","The kids are running on the playground.|The children are running in the playground.","are running"],
["나는 지금 영어 문장을 만들고 있어요.","나는 만들고 있어요 + 영어 문장을 + 지금","I am making English sentences now.|I'm making English sentences right now.","am making"]]);
UU("L1-2-6","현재진행 2",
"현재진행은 '요즘 하는 일'이나 '곧 확정된 일정'도 표현해요. 진행형의 두 번째 쓰임을 익힙니다.",
[["우리는 이번 주말에 할머니 댁을 방문해요.","우리는 방문해요(방문할 예정) + 할머니 댁을 + 이번 주말에","We are visiting Grandma this weekend.|We are visiting our grandma this weekend.","확정된 일정 = 진행형"],
["그는 요즘 기타를 배우고 있어요.","그는 배우고 있어요 + 기타를 + 요즘","He is learning the guitar these days.|He is learning guitar these days.","these days"],
["나는 오늘 오후에 친구를 만나요.","나는 만나요(만날 예정) + 내 친구를 + 오늘 오후에","I am meeting my friend this afternoon.|I'm meeting a friend this afternoon.","be meeting"]]);
UU("L1-2-7","과거진행",
"과거의 한 순간에 '하고 있던' 일은 「was/were + 동사ing」. 두 사건이 겹치는 장면을 그리는 연습이에요.",
[["네가 전화했을 때 나는 샤워하고 있었어.","나는 샤워하고 있었어 + 네가 전화했을 때","I was taking a shower when you called.|I was showering when you called.","was + Ving"],
["우리는 어젯밤 8시에 저녁을 먹고 있었어요.","우리는 먹고 있었어요 + 저녁을 + 어젯밤 8시에","We were eating dinner at 8 last night.|We were having dinner at eight last night.","were + Ving"],
["그녀는 그때 음악을 듣고 있었어요.","그녀는 듣고 있었어요 + 음악을 + 그때","She was listening to music then.|She was listening to music at that time.","listen to"]]);
UU("L1-2-8","현재완료 1 (경험)",
"'~해 본 적 있다'는 경험은 「have + 과거분사」로! 과거와 다른 현재완료의 첫 번째 얼굴이에요.",
[["나는 그 영화를 세 번 봤어요.","나는 봤어요(본 적 있어요) + 그 영화를 + 세 번","I have seen the movie three times.|I have watched that movie three times.|I've seen the movie three times.","have + p.p."],
["우리는 제주도에 두 번 가 봤어요.","우리는 가 봤어요 + 제주도에 + 두 번","We have been to Jeju twice.|We have been to Jeju Island two times.","have been to"],
["그는 김치를 한 번도 먹어 본 적이 없어요.","그는 한 번도 먹어 본 적 없어요 + 김치를","He has never eaten kimchi.|He has never tried kimchi.","never는 has 뒤에"]]);
UU("L1-2-9","현재완료 2 (계속·완료)",
"과거에 시작해 지금까지 이어지는 일, 방금 끝난 일도 현재완료예요. for와 since의 차이까지 익혀요.",
[["우리는 이 동네에 5년째 살고 있어요.","우리는 살아 왔어요 + 이 동네에 + 5년 동안","We have lived in this neighborhood for five years.|We have lived in this town for five years.","for + 기간"],
["나는 방금 숙제를 끝냈어요.","나는 방금 끝냈어요 + 숙제를","I have just finished my homework.","just는 have 뒤에"],
["그녀는 2020년부터 이 학교에서 가르쳐 왔어요.","그녀는 가르쳐 왔어요 + 이 학교에서 + 2020년부터","She has taught at this school since 2020.|She has been teaching at this school since 2020.","since + 시작점"]]);
UU("L1-2-10","현재완료진행",
"지금도 계속 진행 중임을 강조하려면 「have been + 동사ing」. '~째 하고 있다'를 표현해요.",
[["나는 아침부터 계속 이 책을 읽고 있어요.","나는 계속 읽고 있어요 + 이 책을 + 아침부터","I have been reading this book since morning.|I have been reading this book since this morning.","have been + Ving"],
["그들은 두 시간째 축구를 하고 있어요.","그들은 계속 하고 있어요 + 축구를 + 두 시간 동안","They have been playing soccer for two hours.","for two hours"],
["동생이 한 시간째 울고 있어요.","동생이 계속 울고 있어요 + 한 시간 동안","My brother has been crying for an hour.|My little sister has been crying for an hour.","for an hour"]]);
UU("L1-2-11","조동사 can",
"능력과 허락의 can. 「can + 동사원형」으로 '할 수 있다, 해도 된다'를 자유롭게 말해 봅니다.",
[["나는 라면을 끓일 수 있어요.","나는 끓일 수 있어요 + 라면을","I can cook ramen.|I can make ramen.","can + 동사원형"],
["그녀는 영어로 자기소개를 할 수 있어요.","그녀는 할 수 있어요 + 자기소개를 + 영어로","She can introduce herself in English.","introduce herself"],
["너는 내 자전거를 써도 돼.","너는 써도 돼 + 내 자전거를","You can use my bike.|You can use my bicycle.","can = 허락"]]);
UU("L1-2-12","조동사 could",
"could는 과거의 능력, 그리고 더 공손한 부탁에 써요. can보다 부드러운 뉘앙스를 연습합니다.",
[["나는 어릴 때 나무에 오를 수 있었어요.","나는 오를 수 있었어요 + 나무에 + 어릴 때","I could climb trees when I was little.|I could climb trees when I was young.","could = 과거 능력"],
["창문 좀 열어 주실 수 있나요?","열어 주실 수 있나요 + 창문을","Could you open the window, please?|Could you please open the window?","Could you ~?"],
["우리는 어젯밤에 별을 볼 수 있었어요.","우리는 볼 수 있었어요 + 별을 + 어젯밤에","We could see the stars last night.|We could see stars last night.","could see"]]);
UU("L1-2-13","조동사 should / had better",
"가벼운 조언은 should, '안 그러면 큰일 나'는 had better. 충고의 강도를 조절하는 법을 배워요.",
[["너는 물을 더 마시는 게 좋겠어.","너는 마시는 게 좋겠어 + 물을 + 더","You should drink more water.","should + 동사원형"],
["우리는 지금 출발하는 게 좋겠어.","우리는 출발하는 게 좋겠어 + 지금","We had better leave now.|We'd better leave now.","had better + 동사원형"],
["학생들은 수업 중에 휴대폰을 꺼야 해요.","학생들은 꺼야 해요 + 휴대폰을 + 수업 중에","Students should turn off their phones in class.|Students should turn off their cell phones during class.","turn off"]]);
UU("L1-2-14","조동사 have to",
"외부 규칙이나 상황 때문에 '해야만 하는' 일은 have to. 주어에 따라 has to로 바뀌는 것까지 챙겨요.",
[["나는 오늘 밤까지 이 보고서를 끝내야 해요.","나는 끝내야 해요 + 이 보고서를 + 오늘 밤까지","I have to finish this report by tonight.","by tonight"],
["그는 매일 약을 먹어야 해요.","그는 먹어야 해요 + 약을 + 매일","He has to take medicine every day.|He has to take his medicine every day.","약을 먹다: take"],
["우리는 도서관에서 조용히 해야 해요.","우리는 조용히 해야 해요 + 도서관에서","We have to be quiet in the library.","have to be + 형용사"]]);

CH(1, "명사를 꾸미는 법 — 뒤에서 수식하기");
UU("L1-3-1","전치사구 수식 1",
"한국어는 '책상 위의 책'처럼 앞에서 꾸미지만, 영어는 the book on the desk처럼 명사 뒤에 전치사구를 붙여요. 어순 감각 뒤집기 훈련!",
[["책상 위의 책은 내 거예요.","책은 + 책상 위의 + 내 거예요","The book on the desk is mine.","명사 + 전치사구"],
["문 옆의 소년이 내 동생이에요.","소년이 + 문 옆의 + 내 동생이에요","The boy next to the door is my brother.|The boy by the door is my brother.","next to / by"],
["상자 안의 고양이가 자고 있어요.","고양이가 + 상자 안의 + 자고 있어요","The cat in the box is sleeping.","in the box"]]);
UU("L1-3-2","전치사구 수식 2",
"of, with, from 같은 전치사로 명사를 더 풍성하게 꾸며요. '긴 머리의 소녀'도 영어로는 명사 뒤에서!",
[["긴 머리의 그 소녀는 내 친구예요.","그 소녀는 + 긴 머리의 + 내 친구예요","The girl with long hair is my friend.","with = ~를 가진"],
["캐나다에서 온 학생이 우리 반에 합류했어요.","학생이 + 캐나다에서 온 + 합류했어요 + 우리 반에","A student from Canada joined our class.|The student from Canada joined our class.","from = 출신"],
["이 책의 제목이 기억나지 않아요.","나는 + 기억할 수 없어요 + 이 책의 제목을","I can't remember the title of this book.|I cannot remember the title of this book.","A of B = B의 A"]]);
UU("L1-3-3","현재분사 수식",
"'자고 있는 아기'처럼 명사가 직접 하고 있는 동작은 동사ing(현재분사)로 꾸며요. 덩어리가 길면 명사 뒤로!",
[["저기서 노래하고 있는 소녀는 내 사촌이에요.","소녀는 + 저기서 노래하고 있는 + 내 사촌이에요","The girl singing over there is my cousin.","명사 + Ving"],
["나는 공원에서 뛰고 있는 개를 봤어요.","나는 봤어요 + 개를 + 공원에서 뛰고 있는","I saw a dog running in the park.|I saw the dog running in the park.","Ving 덩어리는 뒤에"],
["우는 아기가 제 동생이에요.","우는 아기가 + 제 동생이에요","The crying baby is my brother.|The crying baby is my little brother.","한 단어면 앞에서"]]);
UU("L1-3-4","과거분사 수식",
"'깨진 창문'처럼 명사가 당한 상태는 과거분사(p.p.)로 꾸며요. 하는 쪽은 ing, 당하는 쪽은 p.p.!",
[["나는 깨진 창문을 발견했어요.","나는 발견했어요 + 깨진 창문을","I found a broken window.|I found the broken window.","broken = 깨진"],
["프랑스에서 만들어진 그 가방은 비싸요.","그 가방은 + 프랑스에서 만들어진 + 비싸요","The bag made in France is expensive.","명사 + p.p. 덩어리"],
["그는 영어로 쓰인 편지를 받았어요.","그는 받았어요 + 편지를 + 영어로 쓰인","He received a letter written in English.|He got a letter written in English.","written in"]]);
UU("L1-3-5","to부정사 수식",
"'마실 물', '할 일'처럼 '~할'이라는 미래·용도의 꾸밈은 「명사 + to 동사원형」으로 표현해요.",
[["나는 오늘 할 일이 많아요.","나는 가지고 있어요 + 많은 일을 + 할","I have a lot of things to do today.|I have many things to do today.","things to do"],
["마실 물 좀 주시겠어요?","주시겠어요 + 마실 물을 + 나에게","Can I have some water to drink?|Could you give me some water to drink?","water to drink"],
["우리는 앉을 의자가 필요해요.","우리는 필요해요 + 의자가 + 앉을","We need a chair to sit on.|We need chairs to sit on.","sit on까지!"]]);
UU("L1-3-6","관계대명사 1 (주격)",
"문장으로 명사를 꾸미고 싶을 때 who/which/that이 다리가 돼요. '파리에 사는 친구' = a friend who lives in Paris.",
[["나는 파리에 사는 친구가 있어요.","나는 가지고 있어요 + 친구를 + 파리에 사는","I have a friend who lives in Paris.|I have a friend that lives in Paris.","사람 = who"],
["나는 정원이 있는 집을 원해요.","나는 원해요 + 집을 + 정원이 있는","I want a house which has a garden.|I want a house that has a garden.","사물 = which/that"],
["저기 서 있는 남자는 우리 선생님이에요.","남자는 + 저기 서 있는 + 우리 선생님이에요","The man who is standing over there is our teacher.|The man standing over there is our teacher.","who + 동사"]]);
UU("L1-3-7","관계대명사 2 (목적격)",
"'내가 어제 산 책'처럼 꾸미는 문장 안에서 명사가 목적어일 때! 목적격 관계대명사는 생략도 가능해요.",
[["이것이 내가 어제 산 책이에요.","이것이 + 책이에요 + 내가 어제 산","This is the book that I bought yesterday.|This is the book which I bought yesterday.|This is the book I bought yesterday.","that 생략 가능"],
["네가 만난 그 여자는 의사예요.","그 여자는 + 네가 만난 + 의사예요","The woman you met is a doctor.|The woman that you met is a doctor.|The woman whom you met is a doctor.","명사 + (that) + 주어 + 동사"],
["나는 네가 만든 쿠키를 좋아해요.","나는 좋아해요 + 쿠키를 + 네가 만든","I like the cookies you made.|I like the cookies that you made.|I love the cookies you made.","you made가 뒤에서 수식"]]);
UU("L1-3-8","관계부사",
"장소는 where, 시간은 when, 이유는 why. '우리가 처음 만난 장소'처럼 상황 전체로 명사를 꾸며요.",
[["여기가 우리가 처음 만난 카페예요.","여기가 + 카페예요 + 우리가 처음 만난","This is the cafe where we first met.|This is the cafe where we met for the first time.","장소 + where"],
["나는 네가 태어난 해를 기억해요.","나는 기억해요 + 그 해를 + 네가 태어난","I remember the year when you were born.","시간 + when"],
["그가 늦은 이유를 말해 줘.","말해 줘 + 나에게 + 이유를 + 그가 늦은","Tell me the reason why he was late.|Tell me why he was late.","reason + why"]]);

CH(1, "동사와 형용사를 꾸미는 법");
UU("L1-4-1","부사로 동사 꾸미기",
"동사에 '어떻게'를 더하는 부사. 영어 부사는 보통 동사 덩어리 뒤에 와요.",
[["그녀는 노래를 아름답게 불러요.","그녀는 불러요 + 노래를 + 아름답게","She sings beautifully.|She sings songs beautifully.","형용사+ly"],
["그는 질문에 빠르게 대답했어요.","그는 대답했어요 + 그 질문에 + 빠르게","He answered the question quickly.","answer + 목적어"],
["우리 팀은 열심히 연습했어요.","우리 팀은 연습했어요 + 열심히","Our team practiced hard.","hard는 모양 그대로"]]);
UU("L1-4-2","부사로 형용사·부사 꾸미기",
"very, really, too처럼 형용사나 다른 부사를 '얼마나'로 키우는 부사들. 위치는 꾸미는 말 바로 앞!",
[["이 문제는 너무 어려워요.","이 문제는 + 너무 어려워요","This problem is too difficult.|This question is too hard.","too + 형용사"],
["그 영화는 정말 재미있었어요.","그 영화는 + 정말 재미있었어요","The movie was really fun.|The movie was really interesting.","really + 형용사"],
["그녀는 매우 일찍 일어나요.","그녀는 일어나요 + 매우 일찍","She gets up very early.|She wakes up very early.","very + 부사"]]);
UU("L1-4-3","빈도부사",
"always, usually, often, sometimes, never — '얼마나 자주'는 일반동사 앞, be동사 뒤!",
[["나는 항상 아침을 먹어요.","나는 + 항상 + 먹어요 + 아침을","I always eat breakfast.|I always have breakfast.","일반동사 앞"],
["그는 가끔 학교에 늦어요.","그는 + 늦어요 + 가끔 + 학교에","He is sometimes late for school.","be동사 뒤"],
["우리는 절대 거짓말을 하지 않아요.","우리는 + 절대 하지 않아요 + 거짓말을","We never tell lies.|We never lie.","never 하나로 부정"]]);
UU("L1-4-4","전치사구로 동사 꾸미기",
"동사 뒤에 전치사구를 붙여 장소·시간·방법을 더해요. 순서는 보통 「장소 → 시간」!",
[["우리는 일요일마다 교회에서 만나요.","우리는 만나요 + 교회에서 + 일요일마다","We meet at church on Sundays.|We meet at church every Sunday.","장소 → 시간"],
["그는 버스로 학교에 가요.","그는 가요 + 학교에 + 버스로","He goes to school by bus.","by + 교통수단"],
["나는 저녁 식사 후에 숙제를 해요.","나는 해요 + 숙제를 + 저녁 식사 후에","I do my homework after dinner.","after dinner"]]);

CH(1, "긴 명사 만들기 — 동명사·to부정사·명사절");
UU("L1-5-1","동명사 주어·목적어",
"'책 읽기', '수영하기'처럼 동작을 명사로 쓰려면 동사ing! 주어로도 목적어로도 자유자재로.",
[["책 읽기는 내 취미예요.","책 읽기는 + 내 취미예요","Reading books is my hobby.|Reading is my hobby.","Ving 주어는 단수"],
["나는 사진 찍는 것을 즐겨요.","나는 즐겨요 + 사진 찍기를","I enjoy taking pictures.|I enjoy taking photos.","enjoy + Ving"],
["그는 게임하는 것을 멈췄어요.","그는 멈췄어요 + 게임하기를","He stopped playing games.|He stopped playing the game.","stop + Ving"]]);
UU("L1-5-2","to부정사 명사 역할 1",
"'~하는 것'을 to + 동사원형으로! want, hope, decide 같은 동사는 to부정사를 목적어로 데려와요.",
[["나는 의사가 되고 싶어요.","나는 원해요 + 의사가 되기를","I want to be a doctor.|I want to become a doctor.","want to + 동사원형"],
["우리는 그 콘서트에 가기로 결정했어요.","우리는 결정했어요 + 그 콘서트에 가기로","We decided to go to the concert.","decide to"],
["그녀는 새 언어를 배우기를 희망해요.","그녀는 희망해요 + 새 언어를 배우기를","She hopes to learn a new language.","hope to"]]);
UU("L1-5-3","to부정사 명사 역할 2 (가주어 it)",
"주어가 길면 영어는 it을 앞세우고 진짜 주어는 뒤로! 「It is 형용사 + to 동사원형」 패턴을 익혀요.",
[["매일 운동하는 것은 중요해요.","그것은 + 중요해요 + 매일 운동하는 것은","It is important to exercise every day.|Exercising every day is important.","It ~ to ..."],
["외국어를 배우는 것은 쉽지 않아요.","그것은 + 쉽지 않아요 + 외국어를 배우는 것은","It is not easy to learn a foreign language.|It isn't easy to learn a foreign language.","It is not easy to"],
["밤에 혼자 걷는 것은 위험해요.","그것은 + 위험해요 + 밤에 혼자 걷는 것은","It is dangerous to walk alone at night.","dangerous to"]]);
UU("L1-5-4","의미상 주어",
"'네가 그렇게 말하다니 친절하구나'처럼 to부정사의 주인을 밝힐 땐 for(또는 of) + 사람!",
[["네가 일찍 일어나는 것은 어려워.","그것은 + 어려워 + 네가 + 일찍 일어나는 것은","It is hard for you to get up early.|It is difficult for you to get up early.","for + 사람 + to"],
["저를 도와주시다니 친절하시네요.","그것은 + 친절해요 + 당신이 + 저를 도와주다니","It is kind of you to help me.","성격 형용사 = of"],
["학생들이 그 규칙을 따르는 것이 필요해요.","그것은 + 필요해요 + 학생들이 + 그 규칙을 따르는 것이","It is necessary for students to follow the rule.|It is necessary for students to follow the rules.","for students to"]]);
UU("L1-5-5","의문사 + to부정사",
"what to do, how to make처럼 「의문사 + to부정사」는 통째로 하나의 명사 덩어리가 돼요.",
[["나는 무엇을 말해야 할지 모르겠어요.","나는 모르겠어요 + 무엇을 말해야 할지","I don't know what to say.|I do not know what to say.","what to + 동사원형"],
["김치 만드는 법을 가르쳐 주세요.","가르쳐 주세요 + 나에게 + 김치 만드는 법을","Please teach me how to make kimchi.|Teach me how to make kimchi, please.","how to make"],
["우리는 어디서 만날지 결정해야 해요.","우리는 결정해야 해요 + 어디서 만날지","We have to decide where to meet.|We need to decide where to meet.","where to meet"]]);
UU("L1-5-6","명사절 1 (that절 목적어)",
"'나는 ~라고 생각해'처럼 문장 전체를 목적어로! think, know, believe 뒤에 that + 문장.",
[["나는 그가 정직하다고 생각해요.","나는 생각해요 + 그가 정직하다고","I think that he is honest.|I think he is honest.","that 생략 가능"],
["우리는 네가 시험에 합격할 거라고 믿어요.","우리는 믿어요 + 네가 시험에 합격할 거라고","We believe that you will pass the exam.|We believe you will pass the test.","believe (that)"],
["나는 그녀가 캐나다에 산다는 것을 알아요.","나는 알아요 + 그녀가 캐나다에 산다는 것을","I know that she lives in Canada.|I know she lives in Canada.","know (that)"]]);
UU("L1-5-7","명사절 2 (that절 주어·가주어)",
"that절이 주어로 올 땐 너무 기니까 it으로 바꿔치기! 「It is 형용사 + that 문장」.",
[["네가 그 시험에 합격했다는 것은 놀라워.","그것은 + 놀라워 + 네가 그 시험에 합격했다는 것은","It is amazing that you passed the exam.|It is surprising that you passed the exam.","It ~ that ..."],
["그가 거짓말을 했다는 것은 사실이에요.","그것은 + 사실이에요 + 그가 거짓말을 했다는 것은","It is true that he lied.|It is true that he told a lie.","It is true that"],
["우리가 함께라는 것이 중요해요.","그것은 + 중요해요 + 우리가 함께라는 것이","It is important that we are together.","It is important that"]]);
UU("L1-5-8","명사절 3 (whether/if)",
"'~인지 아닌지'는 whether나 if로! 확실하지 않은 내용을 명사 덩어리로 만들어요.",
[["나는 그가 올지 안 올지 모르겠어요.","나는 모르겠어요 + 그가 올지 안 올지","I don't know whether he will come or not.|I don't know if he will come.|I don't know whether he will come.","whether/if"],
["내일 비가 올지 궁금해요.","나는 궁금해요 + 내일 비가 올지","I wonder if it will rain tomorrow.|I wonder whether it will rain tomorrow.","wonder if"],
["그녀가 그 소식을 들었는지 물어봐 줘.","물어봐 줘 + 그녀에게 + 그녀가 그 소식을 들었는지","Ask her if she heard the news.|Ask her whether she heard the news.|Please ask her if she heard the news.","ask + if절"]]);
UU("L1-5-9","의문사 명사절 1 (what/who)",
"'그가 무엇을 원하는지'를 문장 속에 넣을 땐 「의문사 + 주어 + 동사」 순서! 의문문 어순이 아니에요.",
[["나는 그가 무엇을 원하는지 알아요.","나는 알아요 + 그가 무엇을 원하는지","I know what he wants.","what + 주어 + 동사"],
["누가 그 창문을 깼는지 말해 줘.","말해 줘 + 나에게 + 누가 그 창문을 깼는지","Tell me who broke the window.","who가 주어"],
["네가 무슨 말을 하는지 이해가 안 돼.","나는 이해 못 해요 + 네가 무슨 말을 하는지","I don't understand what you mean.|I don't understand what you are saying.","what you mean"]]);
UU("L1-5-10","의문사 명사절 2 (when/where/why)",
"시간·장소·이유를 묻는 내용도 「의문사 + 주어 + 동사」 덩어리로 문장 속에 쏙!",
[["나는 그 가게가 언제 문을 여는지 모르겠어요.","나는 모르겠어요 + 그 가게가 언제 문을 여는지","I don't know when the store opens.|I don't know when the shop opens.","when + 주어 + 동사"],
["그녀가 어디에 사는지 아세요?","아세요 + 그녀가 어디에 사는지","Do you know where she lives?","where she lives"],
["그가 왜 화났는지 궁금해요.","나는 궁금해요 + 그가 왜 화났는지","I wonder why he is angry.|I wonder why he got angry.","why he is angry"]]);
UU("L1-5-11","의문사 명사절 3 (how)",
"how는 방법뿐 아니라 how much, how long처럼 정도까지! 덩어리째 명사 자리에 넣어요.",
[["나는 그녀가 그 문제를 어떻게 풀었는지 궁금해요.","나는 궁금해요 + 그녀가 그 문제를 어떻게 풀었는지","I wonder how she solved the problem.","how + 주어 + 동사"],
["이게 얼마인지 아세요?","아세요 + 이것이 얼마인지","Do you know how much this is?|Do you know how much this costs?","how much"],
["그 영화가 얼마나 긴지 말해 줘.","말해 줘 + 나에게 + 그 영화가 얼마나 긴지","Tell me how long the movie is.","how long"]]);

CH(1, "문장을 꾸미는 법 — 접속사와 분사구문");
UU("L1-6-1","시간 접속사 1 (when/while)",
"두 문장을 시간으로 연결! when(~할 때), while(~하는 동안)로 장면을 겹쳐 보세요.",
[["내가 집에 도착했을 때 비가 오고 있었어요.","비가 오고 있었어요 + 내가 집에 도착했을 때","It was raining when I got home.|When I got home, it was raining.|It was raining when I arrived home.","when + 주어 + 동사"],
["엄마가 요리하시는 동안 나는 식탁을 차렸어요.","나는 차렸어요 + 식탁을 + 엄마가 요리하시는 동안","I set the table while Mom was cooking.|While Mom was cooking, I set the table.","while + 진행"],
["나는 어렸을 때 부산에 살았어요.","나는 살았어요 + 부산에 + 내가 어렸을 때","I lived in Busan when I was young.|When I was young, I lived in Busan.|I lived in Busan when I was little.","when I was young"]]);
UU("L1-6-2","시간 접속사 2 (before/after/until)",
"before(~하기 전에), after(~한 후에), until(~할 때까지)로 사건의 순서를 정확하게!",
[["자기 전에 이를 닦으세요.","닦으세요 + 이를 + 자기 전에","Brush your teeth before you go to bed.|Brush your teeth before going to bed.","before + 주어 + 동사"],
["숙제를 끝낸 후에 너는 놀 수 있어.","너는 놀 수 있어 + 네가 숙제를 끝낸 후에","You can play after you finish your homework.|After you finish your homework, you can play.","after절"],
["내가 돌아올 때까지 여기서 기다려 줘.","기다려 줘 + 여기서 + 내가 돌아올 때까지","Wait here until I come back.|Please wait here until I come back.|Wait here until I return.","until"]]);
UU("L1-6-3","조건 접속사 (if/unless)",
"'만약 ~라면'은 if! 조건절에서는 미래 일이라도 현재시제를 쓴다는 게 포인트예요.",
[["내일 비가 오면 우리는 집에 있을 거예요.","우리는 있을 거예요 + 집에 + 내일 비가 오면","If it rains tomorrow, we will stay home.|We will stay home if it rains tomorrow.|If it rains tomorrow, we will stay at home.","if절은 현재시제"],
["질문이 있으면 손을 드세요.","드세요 + 손을 + 질문이 있으면","If you have a question, raise your hand.|Raise your hand if you have a question.|If you have any questions, raise your hand.","if you have"],
["서두르지 않으면 너는 버스를 놓칠 거야.","너는 놓칠 거야 + 버스를 + 서두르지 않으면","If you don't hurry, you will miss the bus.|You will miss the bus if you don't hurry.|Unless you hurry, you will miss the bus.","if not = unless"]]);
UU("L1-6-4","이유 접속사 (because/since)",
"'~하기 때문에'는 because! 결과와 이유를 한 문장으로 묶어 설득력을 키워요.",
[["피곤했기 때문에 나는 일찍 잤어요.","나는 잤어요 + 일찍 + 피곤했기 때문에","I went to bed early because I was tired.|Because I was tired, I went to bed early.","because + 주어 + 동사"],
["비가 와서 경기가 취소됐어요.","경기가 취소됐어요 + 비가 왔기 때문에","The game was canceled because it rained.|The game was cancelled because it was raining.","수동 + because"],
["그는 아팠기 때문에 학교에 안 왔어요.","그는 안 왔어요 + 학교에 + 그가 아팠기 때문에","He didn't come to school because he was sick.|Since he was sick, he didn't come to school.","because/since"]]);
UU("L1-6-5","양보 접속사 1 (though/although)",
"'~인데도 불구하고'는 though/although! 반전이 있는 문장으로 표현의 폭을 넓혀요.",
[["비가 왔지만 우리는 소풍을 갔어요.","우리는 갔어요 + 소풍을 + 비가 왔지만","Although it rained, we went on a picnic.|Though it rained, we went on a picnic.|We went on a picnic although it rained.","although + 문장"],
["그는 어리지만 매우 현명해요.","그는 + 매우 현명해요 + 그는 어리지만","Although he is young, he is very wise.|Though he is young, he is very wise.|He is very wise although he is young.","비록 ~이지만"],
["바빴는데도 그녀는 나를 도와줬어요.","그녀는 도와줬어요 + 나를 + 그녀가 바빴는데도","Although she was busy, she helped me.|Though she was busy, she helped me.|She helped me although she was busy.","although she was busy"]]);
UU("L1-6-6","양보 접속사 2 (even though/even if)",
"even though(실제로 그랬는데도)와 even if(설령 그렇더라도)의 미묘한 차이까지 잡아요.",
[["최선을 다했는데도 우리는 졌어요.","우리는 졌어요 + 우리가 최선을 다했는데도","Even though we did our best, we lost.|We lost even though we did our best.","even though = 사실"],
["설령 네가 늦더라도 우리는 기다릴게.","우리는 기다릴게 + 설령 네가 늦더라도","Even if you are late, we will wait.|We will wait even if you are late.|Even if you're late, we'll wait for you.","even if = 가정"],
["그는 부자인데도 검소하게 살아요.","그는 살아요 + 검소하게 + 그가 부자인데도","Even though he is rich, he lives simply.|Even though he is rich, he lives a simple life.","even though he is rich"]]);
UU("L1-6-7","분사구문 1 (동시동작)",
"「접속사 + 주어」를 지우고 동사ing로 시작하면 분사구문! '~하면서'를 간결하게 표현해요.",
[["음악을 들으면서 나는 숙제를 했어요.","음악을 들으면서 + 나는 했어요 + 숙제를","Listening to music, I did my homework.|I did my homework, listening to music.|I did my homework while listening to music.","Ving, 주어 + 동사"],
["미소를 지으면서 그녀는 손을 흔들었어요.","미소를 지으면서 + 그녀는 흔들었어요 + 손을","Smiling, she waved her hand.|She waved her hand, smiling.|Smiling, she waved.","smiling"],
["TV를 보면서 저녁을 먹지 마.","먹지 마 + 저녁을 + TV를 보면서","Don't eat dinner watching TV.|Don't eat dinner while watching TV.","while watching"]]);
UU("L1-6-8","분사구문 2 (시간·이유)",
"분사구문은 '~할 때', '~때문에'도 담아요. 문맥이 접속사 역할을 대신하죠.",
[["공원을 걷다가 나는 옛 친구를 만났어요.","공원을 걷다가 + 나는 만났어요 + 옛 친구를","Walking in the park, I met an old friend.|While walking in the park, I met an old friend.","walking = when I walked"],
["피곤해서 그는 일찍 잤어요.","피곤해서 + 그는 잤어요 + 일찍","Being tired, he went to bed early.|Feeling tired, he went to bed early.","being = because he was"],
["그 소식을 듣고 그녀는 울기 시작했어요.","그 소식을 듣고 + 그녀는 시작했어요 + 울기를","Hearing the news, she started to cry.|Hearing the news, she began to cry.|Hearing the news, she started crying.","hearing = when she heard"]]);
UU("L1-6-9","분사구문 3 (수동 분사구문)",
"당하는 입장의 분사구문은 p.p.로 시작! (Being) surprised처럼 being은 보통 생략해요.",
[["그 결과에 놀라서 나는 아무 말도 못 했어요.","그 결과에 놀라서 + 나는 말할 수 없었어요 + 아무것도","Surprised at the result, I couldn't say anything.|Surprised by the result, I could not say anything.","(Being) surprised"],
["한국에서 만들어져서 이 제품은 인기가 많아요.","한국에서 만들어져서 + 이 제품은 + 인기가 많아요","Made in Korea, this product is popular.|Made in Korea, this product is very popular.","Made in Korea"],
["숲에서 길을 잃어서 우리는 도움을 요청했어요.","숲에서 길을 잃어서 + 우리는 요청했어요 + 도움을","Lost in the forest, we asked for help.|Lost in the woods, we asked for help.","Lost = 길을 잃은"]]);

/* ---------- LEVEL 2 · 2차 임계점 ---------- */
LV(2);
CH(2, "의미를 가르는 시제");
UU("L2-1-1","현재 vs 현재진행",
"'늘 그렇다'는 현재, '지금만 그렇다'는 현재진행. 한 끗 차이로 의미가 갈리는 시제 감각을 잡아요.",
[["나는 보통 7시에 일어나는데, 오늘은 늦잠을 자고 있어요.","나는 일어나요 + 보통 7시에 + 그런데 + 나는 늦잠 자고 있어요 + 오늘은","I usually get up at seven, but I am sleeping in today.|I usually wake up at 7, but today I'm sleeping in.","습관 vs 지금"],
["그녀는 은행에서 일하는데, 이번 주는 재택근무 중이에요.","그녀는 일해요 + 은행에서 + 그런데 + 일하고 있어요 + 집에서 + 이번 주는","She works at a bank, but she is working from home this week.|She works at a bank, but this week she is working from home.","일반 vs 이번 주"],
["물은 100도에서 끓어요.","물은 끓어요 + 100도에서","Water boils at 100 degrees.|Water boils at 100 degrees Celsius.","불변의 사실 = 현재"]]);
UU("L2-1-2","과거 vs 과거진행",
"'하고 있던 중'(배경)에 '일어난 일'(사건)이 끼어드는 구조. 영어 스토리텔링의 기본 골격이에요.",
[["내가 설거지를 하고 있을 때 전화가 울렸어요.","전화가 울렸어요 + 내가 설거지를 하고 있을 때","The phone rang while I was doing the dishes.|The phone rang while I was washing the dishes.","사건=과거, 배경=진행"],
["우리가 도착했을 때 그들은 저녁을 먹고 있었어요.","그들은 먹고 있었어요 + 저녁을 + 우리가 도착했을 때","They were eating dinner when we arrived.|They were having dinner when we arrived.","when + 과거"],
["어제 이 시간에 나는 도서관에서 공부하고 있었어요.","나는 공부하고 있었어요 + 도서관에서 + 어제 이 시간에","I was studying at the library at this time yesterday.|I was studying in the library at this time yesterday.","특정 시점 진행"]]);
UU("L2-1-3","현재완료 vs 과거",
"과거는 '끝난 옛날이야기', 현재완료는 '지금과 연결된 일'. 영어에서 가장 한국인이 헷갈리는 구분!",
[["나는 어제 열쇠를 잃어버렸어요. 그런데 아직도 그것을 못 찾았어요.","나는 잃어버렸어요 + 열쇠를 + 어제 + 그리고 + 나는 못 찾았어요 + 그것을 + 아직","I lost my key yesterday, and I still haven't found it.|I lost my keys yesterday and I haven't found them yet.","yesterday=과거"],
["우리는 아직 결정하지 못했어요.","우리는 결정하지 못했어요 + 아직","We haven't decided yet.|We have not decided yet.","yet + 현재완료"],
["그는 2010년에 서울로 이사했고, 그 이후로 쭉 거기 살고 있어요.","그는 이사했어요 + 서울로 + 2010년에 + 그리고 + 살아 왔어요 + 거기에 + 그 이후로","He moved to Seoul in 2010 and has lived there since then.|He moved to Seoul in 2010, and he has lived there ever since.","since then"]]);
UU("L2-1-4","현재완료 vs 현재완료진행",
"완료형은 '결과', 완료진행형은 '계속하는 중'에 초점. 무엇을 강조할지 골라 쓰는 연습이에요.",
[["나는 두 시간 동안 공부했지만 아직 한 챕터도 못 끝냈어요.","나는 공부해 오고 있어요 + 두 시간 동안 + 그런데 + 못 끝냈어요 + 한 챕터도","I have been studying for two hours, but I haven't finished a chapter yet.|I have been studying for two hours, but I still haven't finished one chapter.","진행=과정 강조"],
["아침부터 눈이 내리고 있어요.","눈이 내리고 있어요 + 아침부터","It has been snowing since morning.|It has been snowing since this morning.","has been Ving"],
["그녀는 일주일째 그 문제를 풀려고 노력하고 있어요.","그녀는 노력해 오고 있어요 + 그 문제를 풀려고 + 일주일 동안","She has been trying to solve the problem for a week.","trying for a week"]]);
UU("L2-1-5","과거완료",
"과거보다 더 과거! 두 과거 사건의 순서를 「had + p.p.」로 정리해요.",
[["내가 역에 도착했을 때 기차는 이미 떠나 있었어요.","기차는 이미 떠나 있었어요 + 내가 역에 도착했을 때","The train had already left when I arrived at the station.|When I arrived at the station, the train had already left.","had p.p. = 더 과거"],
["나는 그가 나에게 말해 주기 전까지 그 소식을 못 들었었어요.","나는 못 들었었어요 + 그 소식을 + 그가 말해 주기 전까지","I hadn't heard the news until he told me.|I had not heard the news until he told me.","hadn't p.p."],
["그녀는 숙제를 끝낸 후에 자러 갔어요.","그녀는 자러 갔어요 + 그녀가 숙제를 끝낸 후에","She went to bed after she had finished her homework.|After she had finished her homework, she went to bed.|She went to bed after she finished her homework.","after + had p.p."]]);
UU("L2-1-6","과거완료진행",
"과거의 한 시점까지 '쭉 하고 있었던' 일은 「had been + 동사ing」로 표현해요.",
[["비가 그쳤을 때 이미 세 시간째 내리고 있었어요.","비가 내려 오고 있었어요 + 세 시간 동안 + 비가 그쳤을 때","It had been raining for three hours when it stopped.|It had been raining for three hours before it stopped.","had been Ving"],
["네가 전화했을 때 나는 한 시간째 기다리고 있었어.","나는 기다려 오고 있었어 + 한 시간 동안 + 네가 전화했을 때","I had been waiting for an hour when you called.|I had been waiting for one hour when you called.","for an hour"],
["우리는 이사하기 전에 그 집에서 10년간 살고 있었어요.","우리는 살아 오고 있었어요 + 그 집에서 + 10년 동안 + 우리가 이사하기 전에","We had been living in that house for ten years before we moved.|We had been living in the house for 10 years before we moved.","before we moved"]]);
UU("L2-1-7","미래 will (결심·예측·약속)",
"그 자리에서 결정한 일, 예측, 약속은 will! 미래의 세 가지 얼굴을 연습해요.",
[["무거워 보이네요. 제가 가방을 들어 드릴게요.","제가 들어 드릴게요 + 당신의 가방을","I will carry your bag.|I'll carry your bag for you.","즉석 결심"],
["우리 팀이 이번 시즌 우승할 거예요.","우리 팀이 우승할 거예요 + 이번 시즌에","Our team will win the championship this season.|Our team will win the title this season.","예측"],
["아무에게도 말하지 않을게. 약속해.","나는 말하지 않을게 + 아무에게도 + 나는 약속해","I won't tell anyone. I promise.|I will not tell anyone. I promise.","won't = 약속"]]);
UU("L2-1-8","미래 be going to",
"이미 마음먹은 계획, 눈에 보이는 근거가 있는 예측은 be going to! will과의 차이를 몸에 새겨요.",
[["하늘 좀 봐. 곧 비가 올 거야.","봐 + 하늘을 + 비가 올 거야 + 곧","Look at the sky. It is going to rain soon.|Look at the sky. It's going to rain.","눈에 보이는 근거"],
["그들은 다음 달에 작은 카페를 열 예정이에요.","그들은 열 예정이에요 + 작은 카페를 + 다음 달에","They are going to open a small cafe next month.|They're going to open a small cafe next month.","이미 정한 계획"],
["나는 이번 방학에 수영을 배울 계획이에요.","나는 배울 계획이에요 + 수영을 + 이번 방학에","I am going to learn to swim this vacation.|I'm going to learn swimming this vacation.","be going to"]]);
UU("L2-1-9","미래진행",
"미래의 한 시점에 '하고 있을' 일은 「will be + 동사ing」. 내일 이 시간의 나를 상상해 보세요.",
[["내일 이 시간에 나는 비행기를 타고 있을 거예요.","나는 날고 있을 거예요 + 내일 이 시간에","I will be flying at this time tomorrow.|I will be on a plane at this time tomorrow.","will be Ving"],
["7시에 우리는 저녁을 먹고 있을 거예요.","우리는 먹고 있을 거예요 + 저녁을 + 7시에","We will be having dinner at seven.|We will be eating dinner at 7.","at seven"],
["그녀는 다음 주 이맘때 제주에서 여행하고 있을 거예요.","그녀는 여행하고 있을 거예요 + 제주에서 + 다음 주 이맘때","She will be traveling in Jeju this time next week.|She will be travelling in Jeju around this time next week.","this time next week"]]);
UU("L2-1-10","미래완료",
"미래의 어느 시점까지 '끝나 있을' 일은 「will have + p.p.」. 마감의 언어예요!",
[["다음 달이면 우리는 이 프로젝트를 끝내 놓았을 거예요.","우리는 끝내 놓았을 거예요 + 이 프로젝트를 + 다음 달까지","We will have finished this project by next month.|We will have completed this project by next month.","by + will have p.p."],
["내년이면 그들은 결혼한 지 20년이 돼요.","그들은 결혼해 있은 지 20년이 될 거예요 + 내년이면","They will have been married for twenty years next year.|By next year, they will have been married for 20 years.","will have been"],
["네가 도착할 때쯤 나는 이미 떠나 있을 거야.","나는 이미 떠나 있을 거야 + 네가 도착할 때쯤","I will have already left by the time you arrive.|I will have left by the time you arrive.","by the time"]]);
UU("L2-1-11","시간·조건절의 현재시제",
"when, if 뒤에서는 미래라도 현재시제! 영어의 약속 같은 규칙을 확실히 잡아요.",
[["그가 도착하면 우리는 출발할 거예요.","우리는 출발할 거예요 + 그가 도착하면","We will leave when he arrives.|When he arrives, we will leave.","when + 현재"],
["일이 끝나자마자 너에게 전화할게.","나는 전화할게 + 너에게 + 일이 끝나자마자","I will call you as soon as I finish work.|I'll call you as soon as the work is done.","as soon as + 현재"],
["내일 날씨가 좋으면 우리는 하이킹하러 갈 거예요.","우리는 갈 거예요 + 하이킹하러 + 내일 날씨가 좋으면","If the weather is nice tomorrow, we will go hiking.|We will go hiking if the weather is good tomorrow.","if + 현재"]]);
UU("L2-1-12","시제 일치",
"주절이 과거면 종속절도 한 칸 과거로! said, thought 뒤 문장의 시제를 맞추는 연습이에요.",
[["그는 자기가 늦을 거라고 말했어요.","그는 말했어요 + 자기가 늦을 거라고","He said he would be late.|He said that he would be late.","will → would"],
["나는 그녀가 아픈 줄 알았어요.","나는 생각했어요 + 그녀가 아프다고","I thought she was sick.|I thought that she was sick.","is → was"],
["우리는 그가 이미 떠났다는 것을 알았어요.","우리는 알았어요 + 그가 이미 떠났다는 것을","We knew that he had already left.|We knew he had already left.","과거의 과거 = had p.p."]]);

CH(2, "사물 주어 — 원어민처럼 말하기");
UU("L2-2-1","사물 주어 + 감정 동사",
"'그 소식이 나를 놀라게 했다'처럼 사물을 주어로! 한국어엔 어색해도 영어에선 가장 자연스러운 어순이에요.",
[["그 소식은 모두를 놀라게 했어요.","그 소식은 + 놀라게 했어요 + 모두를","The news surprised everyone.|The news surprised everybody.","사물이 주어"],
["따뜻한 차 한 잔이 내 기분을 좋게 해 줬어요.","따뜻한 차 한 잔이 + 좋게 해 줬어요 + 내 기분을","A warm cup of tea lifted my mood.|A cup of warm tea lifted my mood.","사물 + lift"],
["그 영화는 나를 울게 만들었어요.","그 영화는 + 만들었어요 + 나를 + 울게","The movie made me cry.","make + 목적어 + 동사원형"]]);
UU("L2-2-2","사물 주어 + remind/tell/show",
"사진이 말을 걸고, 표지판이 알려 주는 영어! 「사물 + remind/tell/show + 사람」 구조를 익혀요.",
[["이 노래는 나에게 중학교 시절을 떠올리게 해요.","이 노래는 + 떠올리게 해요 + 나에게 + 중학교 시절을","This song reminds me of my middle school days.|This song reminds me of middle school.","remind A of B"],
["그 표지판은 출구가 어디인지 알려 줘요.","그 표지판은 + 알려 줘요 + 우리에게 + 출구가 어디인지","The sign tells us where the exit is.|The sign shows us where the exit is.","tell/show"],
["이 지도는 너에게 가장 빠른 길을 보여 줄 거야.","이 지도는 + 보여 줄 거야 + 너에게 + 가장 빠른 길을","This map will show you the fastest way.|This map will show you the quickest route.","show + 사람 + 사물"]]);
UU("L2-2-3","사물 주어 + lead/take/bring",
"길이 데려다주고, 노력이 이끌어 주는 표현! 이동 동사와 사물 주어의 콜라보예요.",
[["이 길은 시청으로 이어져요.","이 길은 + 이어져요 + 시청으로","This road leads to City Hall.|This street leads to City Hall.","lead to"],
["10분만 걸으면 박물관에 도착해요.","10분 걷기가 + 데려다줘요 + 당신을 + 박물관에","A ten-minute walk takes you to the museum.|A ten-minute walk will take you to the museum.","걷기가 주어"],
["열심히 하면 좋은 결과가 와요.","노력이 + 가져와요 + 좋은 결과를","Hard work brings good results.|Hard work brings good outcomes.","hard work가 주어"]]);
UU("L2-2-4","사물 주어 + make/help",
"교통 체증이 지각시키고, 영상이 요리를 돕는다! 원인을 주어로 세우는 영어식 사고를 연습해요.",
[["교통 체증 때문에 나는 학교에 늦었어요.","교통 체증이 + 만들었어요 + 나를 + 늦게 + 학교에","The traffic made me late for school.|Heavy traffic made me late for school.","사물 make + 목 + 형"],
["그 영상이 내가 요리를 시작하도록 도와줬어요.","그 영상이 + 도와줬어요 + 내가 + 요리를 시작하도록","The video helped me start cooking.|The video helped me to start cooking.","help + 목 + (to)V"],
["그 음악은 항상 나를 행복하게 해요.","그 음악은 + 만들어요 + 나를 + 행복하게","The music always makes me happy.|That music always makes me happy.","make + 목 + 형용사"]]);
UU("L2-2-5","사물 주어 + enable/allow",
"인터넷이 가능하게 해 주고, 장학금이 허락해 준다! 「enable/allow + 목적어 + to부정사」 패턴.",
[["인터넷은 우리가 전 세계 사람들과 대화할 수 있게 해 줘요.","인터넷은 + 가능하게 해 줘요 + 우리가 + 전 세계 사람들과 대화하는 것을","The Internet enables us to talk with people around the world.|The Internet allows us to talk to people all over the world.","enable + 목 + to V"],
["그 장학금은 그녀가 유학을 갈 수 있게 해 줬어요.","그 장학금은 + 가능하게 해 줬어요 + 그녀가 + 해외에서 공부하는 것을","The scholarship enabled her to study abroad.|The scholarship allowed her to study abroad.","enabled her to"],
["이 앱은 네가 무료로 영어를 연습할 수 있게 해 줘.","이 앱은 + 허락해 줘 + 네가 + 영어를 연습하는 것을 + 무료로","This app allows you to practice English for free.|This app lets you practice English for free.","allow/let"]]);
UU("L2-2-6","사물 주어 + prevent/keep from",
"부상이 못 뛰게 막고, 소음이 잠을 방해한다! 「prevent/keep + 목적어 + from Ving」로 부정의 원인을 표현해요.",
[["부상 때문에 그는 경기에 못 나갔어요.","부상이 + 막았어요 + 그가 + 경기에서 뛰는 것을","The injury prevented him from playing in the game.|His injury prevented him from playing in the game.","prevent A from Ving"],
["그 소음 때문에 나는 잠을 잘 수 없었어요.","그 소음이 + 막았어요 + 내가 + 자는 것을","The noise kept me from sleeping.|The noise prevented me from sleeping.","keep A from Ving"],
["폭우 때문에 우리는 밖에 못 나갔어요.","폭우가 + 막았어요 + 우리가 + 밖에 나가는 것을","The heavy rain kept us from going outside.|The heavy rain prevented us from going out.","heavy rain이 주어"]]);
UU("L2-2-7","조건·시간의 사물 주어",
"'조금만 연습하면'을 A little practice will...로! 조건절 없이 명사 주어로 간결하게 말하는 고급 기술.",
[["조금만 연습하면 네 실력이 크게 늘 거야.","약간의 연습이 + 향상시킬 거야 + 네 실력을 + 크게","A little practice will improve your skills a lot.|A little practice will greatly improve your skills.","조건 → 주어"],
["5분만 더 있으면 우리는 끝낼 수 있을 거예요.","5분이 더 + 가능하게 할 거예요 + 우리가 끝내는 것을","Five more minutes will allow us to finish.|Five more minutes will enable us to finish.","시간이 주어"],
["네 도움이 큰 변화를 만들 수 있어.","네 도움이 + 만들 수 있어 + 큰 변화를","Your help can make a big difference.|Your help could make a big difference.","make a difference"]]);

CH(2, "수동태 — 당하는 입장의 문장");
UU("L2-3-1","수동태 기본",
"행동을 한 사람보다 '당한 일'이 중요할 때 「be + p.p.」! 주어와 목적어가 자리를 바꿔요.",
[["이 다리는 1990년에 지어졌어요.","이 다리는 + 지어졌어요 + 1990년에","This bridge was built in 1990.|The bridge was built in 1990.","was built"],
["한국어는 수백만 명의 사람들에 의해 사용돼요.","한국어는 + 사용돼요 + 수백만 명에 의해","Korean is spoken by millions of people.","is spoken by"],
["그 창문은 어젯밤에 깨졌어요.","그 창문은 + 깨졌어요 + 어젯밤에","The window was broken last night.|That window was broken last night.","was broken"]]);
UU("L2-3-2","시제별 수동태",
"진행 수동, 완료 수동까지! be동사의 모양만 바꾸면 어떤 시제든 수동태가 돼요.",
[["그 문제는 아직 해결되지 않았어요.","그 문제는 + 해결되지 않았어요 + 아직","The problem hasn't been solved yet.|The problem has not been solved yet.","현재완료 수동"],
["새 도서관이 지금 지어지고 있어요.","새 도서관이 + 지어지고 있어요 + 지금","A new library is being built now.|A new library is being constructed now.","진행 수동"],
["내가 도착했을 때 그 방은 이미 청소되어 있었어요.","그 방은 + 이미 청소되어 있었어요 + 내가 도착했을 때","The room had already been cleaned when I arrived.","과거완료 수동"]]);
UU("L2-3-3","조동사·미래 수동태",
"will be done, must be finished처럼 「조동사 + be + p.p.」! 규칙과 공지의 언어예요.",
[["결과는 다음 주에 발표될 거예요.","결과는 + 발표될 거예요 + 다음 주에","The results will be announced next week.|The result will be announced next week.","will be p.p."],
["이 숙제는 금요일까지 제출되어야 해요.","이 숙제는 + 제출되어야 해요 + 금요일까지","This homework must be submitted by Friday.|This assignment must be turned in by Friday.","must be p.p."],
["휴대폰은 수업 중에 사용될 수 없어요.","휴대폰은 + 사용될 수 없어요 + 수업 중에","Phones cannot be used during class.|Cell phones can't be used in class.","cannot be p.p."]]);
UU("L2-3-4","get 수동태",
"일상 회화에서는 be 대신 get! get hurt, get married처럼 변화의 순간을 생생하게 표현해요.",
[["그는 경기 중에 다쳤어요.","그는 + 다쳤어요 + 경기 중에","He got hurt in the game.|He got injured during the game.","get hurt"],
["그들은 지난봄에 결혼했어요.","그들은 + 결혼했어요 + 지난봄에","They got married last spring.","get married"],
["내 자전거를 도둑맞았어요.","내 자전거가 + 도둑맞았어요","My bike got stolen.|My bicycle got stolen.|My bike was stolen.","get stolen"]]);
UU("L2-3-5","관용 수동 표현",
"be interested in, be satisfied with처럼 전치사와 짝을 이루는 수동 표현들을 통째로!",
[["나는 그 결과에 만족해요.","나는 + 만족해요 + 그 결과에","I am satisfied with the result.|I'm satisfied with the results.","be satisfied with"],
["그녀는 한국 역사에 관심이 있어요.","그녀는 + 관심이 있어요 + 한국 역사에","She is interested in Korean history.","be interested in"],
["그 가수는 전 세계에 알려져 있어요.","그 가수는 + 알려져 있어요 + 전 세계에","The singer is known all over the world.|The singer is known around the world.","be known"]]);

CH(2, "준동사에 시제 입히기");
UU("L2-4-1","완료 부정사 (to have p.p.)",
"본동사보다 '먼저 일어난 일'을 to부정사로 말할 땐 to have p.p.! 시간차를 담는 기술이에요.",
[["그는 어렸을 때 천재였던 것 같아요.","그는 + ~인 것 같아요 + 천재였던 + 어렸을 때","He seems to have been a genius when he was young.|He seems to have been a genius as a child.","to have been"],
["그녀는 그 소식을 이미 들은 것 같아요.","그녀는 + ~인 것 같아요 + 이미 들은 + 그 소식을","She seems to have already heard the news.|She seems to have heard the news already.","to have heard"],
["나는 지갑을 집에 두고 온 것 같아요.","나는 + ~인 것 같아요 + 두고 온 + 지갑을 + 집에","I seem to have left my wallet at home.","to have left"]]);
UU("L2-4-2","수동 부정사 (to be p.p.)",
"'사랑받기를 원한다'처럼 당하는 입장의 to부정사는 to be p.p.로!",
[["이 일은 오늘까지 끝내져야 해요.","이 일은 + 필요해요 + 끝내지는 것이 + 오늘까지","The work needs to be finished by today.|This work needs to be done by today.","to be finished"],
["아기들은 사랑받기를 원해요.","아기들은 + 원해요 + 사랑받기를","Babies want to be loved.","to be loved"],
["그 규칙은 모두에 의해 지켜져야 해요.","그 규칙은 + ~해야 해요 + 지켜지는 것이 + 모두에 의해","The rule has to be followed by everyone.|The rules have to be followed by everyone.","to be followed"]]);
UU("L2-4-3","완료 동명사 (having p.p.)",
"동명사에도 과거가 있다! '~했던 것'은 having p.p.로 시간차를 표현해요.",
[["그는 약속을 잊었던 것을 인정했어요.","그는 인정했어요 + 잊었던 것을 + 약속을","He admitted having forgotten the promise.|He admitted forgetting the promise.","having p.p."],
["나는 어릴 때 거기 갔던 것을 기억해요.","나는 기억해요 + 갔던 것을 + 거기에 + 어릴 때","I remember having gone there when I was young.|I remember going there when I was young.","remember having p.p."],
["그녀는 거짓말했던 것을 부인했어요.","그녀는 부인했어요 + 거짓말했던 것을","She denied having lied.|She denied having told a lie.","deny having p.p."]]);
UU("L2-4-4","완료 분사구문 (Having p.p.)",
"분사구문에서 시간차를 표현하려면 Having p.p.로 시작! '~하고 나서'의 흐름을 담아요.",
[["점심을 안 먹어서 나는 오후에 배가 고팠어요.","점심을 안 먹어서 + 나는 + 배고팠어요 + 오후에","Not having eaten lunch, I was hungry in the afternoon.|Having skipped lunch, I was hungry in the afternoon.","Not having p.p."],
["숙제를 끝내고 나서 그는 게임을 했어요.","숙제를 끝내고 나서 + 그는 했어요 + 게임을","Having finished his homework, he played games.|Having finished his homework, he played a game.","Having finished"],
["그 영화를 전에 봐서 나는 결말을 알고 있었어요.","그 영화를 전에 봐서 + 나는 알고 있었어요 + 결말을","Having seen the movie before, I knew the ending.|Having watched the movie before, I knew the ending.","Having seen"]]);
UU("L2-4-5","의미 덧붙이는 분사구",
"태풍이 한국을 강타하며 피해를 줬다 — 분사구로 문장에 결과·부연을 매끄럽게 이어 붙여요.",
[["태풍이 한국을 강타해서 큰 피해를 일으켰어요.","태풍이 강타했어요 + 한국을 + 큰 피해를 일으키며","A typhoon hit Korea, causing great damage.|The typhoon hit Korea, causing huge damage.",", Ving = 결과"],
["그는 일찍 떠나면서 우리만 남겨 두었어요.","그는 떠났어요 + 일찍 + 우리만 남겨 두면서","He left early, leaving us behind.|He left early, leaving the rest of us behind.",", leaving"],
["그녀의 미소가 모두를 편안하게 하며 분위기를 바꿨어요.","그녀의 미소가 바꿨어요 + 분위기를 + 모두를 편안하게 하며","Her smile changed the mood, putting everyone at ease.|Her smile changed the atmosphere, putting everyone at ease.",", putting"]]);

CH(2, "의문문 · 부정문 · 명령문");
UU("L2-5-1","be동사 의문문",
"평서문을 뒤집기만 하면 질문 완성! be동사를 주어 앞으로 보내는 가장 기본 의문문이에요.",
[["너 지금 배고파?","배고파? + 너 + 지금","Are you hungry now?|Are you hungry right now?","Are you ~?"],
["그 가게 오늘 열었나요?","열었나요? + 그 가게 + 오늘","Is the store open today?|Is the shop open today?","Is ~ open?"],
["그들은 너의 반 친구들이야?","~이야? + 그들은 + 너의 반 친구들","Are they your classmates?","Are they ~?"]]);
UU("L2-5-2","진행형 의문문",
"'지금 ~하고 있어?'는 be동사만 앞으로! 진행형 의문문으로 실시간 질문을 던져요.",
[["너 내 말 듣고 있어?","듣고 있어? + 너 + 내 말을","Are you listening to me?","Are you Ving?"],
["그가 아직 자고 있나요?","자고 있나요? + 그가 + 아직","Is he still sleeping?","Is he Ving?"],
["그때 그들은 화가 나 있었나요?","화가 나 있었나요? + 그들은 + 그때","Were they angry at that time?|Were they angry then?","Were they ~?"]]);
UU("L2-5-3","조동사 의문문",
"can, may, should를 앞세우면 부탁·허락·확인의 질문이 완성돼요.",
[["너 내일 올 수 있어?","올 수 있어? + 너 + 내일","Can you come tomorrow?","Can you ~?"],
["제가 창문을 닫아도 될까요?","닫아도 될까요? + 제가 + 창문을","May I close the window?|Can I close the window?","May I ~?"],
["우리가 지금 출발해야 하나요?","출발해야 하나요? + 우리가 + 지금","Should we leave now?|Do we have to leave now?","Should we ~?"]]);
UU("L2-5-4","일반동사 의문문",
"일반동사 의문문엔 do/does/did 헬퍼 등판! 동사는 원형으로 돌아간다는 게 포인트.",
[["너 매운 음식 좋아해?","좋아해? + 너 + 매운 음식을","Do you like spicy food?","Do you ~?"],
["그녀가 어제 너한테 전화했어?","전화했어? + 그녀가 + 너한테 + 어제","Did she call you yesterday?","Did she ~?"],
["이 버스 시청에 가나요?","가나요? + 이 버스가 + 시청에","Does this bus go to City Hall?|Does this bus go to the city hall?","Does ~?"]]);
UU("L2-5-5","현재완료 의문문",
"'~해 봤어?', '벌써 ~했어?'는 Have you p.p.! 경험과 완료를 묻는 질문이에요.",
[["너 점심 먹었어?","먹었어? + 너 + 점심을","Have you had lunch?|Have you eaten lunch?","Have you p.p.?"],
["그가 벌써 떠났나요?","떠났나요? + 그가 + 벌써","Has he left already?|Has he already left?","Has he ~?"],
["너 해외에 가 본 적 있어?","가 본 적 있어? + 너 + 해외에","Have you ever been abroad?|Have you ever traveled abroad?","ever + p.p."]]);
UU("L2-5-6","who/what 1 (보어를 묻기)",
"'저 사람 누구야?', '네 최애 과목 뭐야?' — be동사와 함께 정체를 묻는 의문사 질문!",
[["저 키 큰 남자는 누구야?","누구야? + 저 키 큰 남자는","Who is that tall man?|Who's that tall guy?","Who is ~?"],
["네가 제일 좋아하는 과목이 뭐야?","뭐야? + 네가 제일 좋아하는 과목이","What is your favorite subject?|What's your favorite subject?","What is ~?"],
["저 상자 안에 뭐가 있어?","뭐가 있어? + 저 상자 안에","What is in the box?|What's in that box?","What is in ~?"]]);
UU("L2-5-7","who/what 2 (주어·목적어를 묻기)",
"who가 주어면 도치 없이 그대로! Who made this?처럼 의문사가 주인공인 질문을 연습해요.",
[["누가 이 케이크를 만들었어?","누가 + 만들었어? + 이 케이크를","Who made this cake?","who = 주어"],
["어젯밤에 무슨 일이 있었어?","무슨 일이 + 있었어? + 어젯밤에","What happened last night?","What happened"],
["너 주말에 보통 뭐 해?","뭐 해? + 너 + 보통 + 주말에","What do you usually do on weekends?|What do you usually do on the weekend?","What do you ~?"]]);
UU("L2-5-8","when/where/why",
"시간·장소·이유를 묻는 3총사! 「의문사 + do/be + 주어」 어순을 자동화해요.",
[["너 언제 한국에 돌아와?","언제 + 돌아와? + 너 + 한국에","When do you come back to Korea?|When are you coming back to Korea?","When ~?"],
["너 그 신발 어디서 샀어?","어디서 + 샀어? + 너 + 그 신발을","Where did you buy the shoes?|Where did you buy those shoes?","Where did ~?"],
["그는 왜 회의에 늦었나요?","왜 + 늦었나요? + 그는 + 회의에","Why was he late for the meeting?","Why was ~?"]]);
UU("L2-5-9","how + 형용사/부사",
"how far, how often, how long — '얼마나'를 묻는 만능 조합을 익혀요.",
[["너희 학교는 집에서 얼마나 멀어?","얼마나 멀어? + 너희 학교는 + 집에서","How far is your school from home?|How far is your school from your house?","How far ~?"],
["너 얼마나 자주 운동해?","얼마나 자주 + 운동해? + 너","How often do you exercise?|How often do you work out?","How often ~?"],
["그 영화 얼마나 길어?","얼마나 길어? + 그 영화는","How long is the movie?","How long ~?"]]);
UU("L2-5-10","be동사 부정문",
"be동사 뒤에 not만 붙이면 부정 완성! not ~ anymore, not yet 같은 콤보까지.",
[["그는 더 이상 학생이 아니에요.","그는 + 아니에요 + 학생이 + 더 이상","He is not a student anymore.|He isn't a student anymore.","not ~ anymore"],
["그 이야기는 사실이 아니었어요.","그 이야기는 + 아니었어요 + 사실이","The story was not true.|The story wasn't true.","was not"],
["우리는 아직 준비가 안 됐어요.","우리는 + 안 됐어요 + 준비가 + 아직","We are not ready yet.|We aren't ready yet.","not ~ yet"]]);
UU("L2-5-11","조동사 부정문",
"can't, must not, won't — 조동사 뒤에 not! 금지와 불가능을 정확하게 표현해요.",
[["여기에 주차하면 안 돼요.","당신은 + 주차하면 안 돼요 + 여기에","You must not park here.|You can't park here.","must not = 금지"],
["나는 그의 이름이 기억나지 않아요.","나는 + 기억할 수 없어요 + 그의 이름을","I can't remember his name.|I cannot remember his name.","can't"],
["모든 사람을 만족시킬 수는 없어.","너는 + 만족시킬 수 없어 + 모든 사람을","You can't please everyone.|You cannot please everybody.","can't please"]]);
UU("L2-5-12","일반동사 부정문",
"don't/doesn't/didn't 뒤에는 반드시 동사원형! 일반동사 부정의 철칙을 새겨요.",
[["나는 아침에 커피를 마시지 않아요.","나는 + 마시지 않아요 + 커피를 + 아침에","I don't drink coffee in the morning.|I do not drink coffee in the morning.","don't + 원형"],
["그녀는 어제 숙제를 하지 않았어요.","그녀는 + 하지 않았어요 + 숙제를 + 어제","She didn't do her homework yesterday.","didn't + 원형"],
["그는 주말에는 일하지 않아요.","그는 + 일하지 않아요 + 주말에는","He doesn't work on weekends.|He does not work on the weekend.","doesn't + 원형"]]);
UU("L2-5-13","명령문 1",
"주어 없이 동사원형으로 시작! 부탁할 땐 please, 금지할 땐 Don't.",
[["문을 살살 닫아 주세요.","닫아 주세요 + 문을 + 살살","Close the door gently, please.|Please close the door gently.","동사원형 시작"],
["길을 건너기 전에 양쪽을 확인해.","확인해 + 양쪽을 + 네가 길을 건너기 전에","Check both ways before you cross the street.|Look both ways before crossing the street.","명령문 + before"],
["늦지 마.","늦지 마","Don't be late.","Don't be ~"]]);
UU("L2-5-14","명령문 2 (Let's / Let me)",
"'~하자'는 Let's, '제가 ~할게요'는 Let me! 함께하자고 제안하는 명령문이에요.",
[["오늘 밤에 피자 시켜 먹자.","시켜 먹자 + 피자를 + 오늘 밤에","Let's order pizza tonight.","Let's + 동사원형"],
["포기하지 말자.","포기하지 말자","Let's not give up.","Let's not"],
["제가 좀 도와드릴게요.","제가 도와드릴게요 + 당신을","Let me help you.|Let me help you a bit.","Let me + 동사원형"]]);

CH(2, "수 일치 — 단수와 복수의 감각");
UU("L2-6-1","집합명사는 단수",
"family, team, committee — 여러 명이 모여도 하나의 덩어리면 단수 동사!",
[["우리 가족은 다섯 명이에요.","우리 가족은 + 가지고 있어요 + 다섯 명을","My family has five members.","family + 단수"],
["그 팀은 매일 아침 훈련해요.","그 팀은 + 훈련해요 + 매일 아침","The team trains every morning.|The team practices every morning.","team + 단수"],
["그 위원회는 매월 첫째 주에 모여요.","그 위원회는 + 모여요 + 매월 첫째 주에","The committee meets in the first week of every month.|The committee meets during the first week of each month.","committee + 단수"]]);
UU("L2-6-2","항상 복수인 명사",
"shoes, pants, glasses — 짝으로 된 물건들은 항상 복수 취급!",
[["이 신발은 나한테 너무 작아요.","이 신발은 + 너무 작아요 + 나에게","These shoes are too small for me.","shoes are"],
["내 바지가 젖었어요.","내 바지가 + 젖었어요","My pants are wet.","pants are"],
["그 안경은 탁자 위에 있어요.","그 안경은 + 있어요 + 탁자 위에","The glasses are on the table.","glasses are"]]);
UU("L2-6-3","복수처럼 보이는 단수",
"math, news, physics — s로 끝나도 단수인 단어들! 함정에 빠지지 않게 조심해요.",
[["수학은 내가 제일 좋아하는 과목이에요.","수학은 + 내가 제일 좋아하는 과목이에요","Math is my favorite subject.|Mathematics is my favorite subject.","Math is"],
["뉴스는 매일 저녁 9시에 시작해요.","뉴스는 + 시작해요 + 매일 저녁 9시에","The news starts at 9 every evening.|The news starts at nine every evening.","news + 단수"],
["10킬로미터는 걷기에 먼 거리예요.","10킬로미터는 + 먼 거리예요 + 걷기에","Ten kilometers is a long distance to walk.|10 kilometers is a long way to walk.","거리·금액 = 단수"]]);
UU("L2-6-4","수량 표현의 수 일치",
"most of, half of, some of — of 뒤 명사를 보고 동사를 결정해요!",
[["대부분의 학생들이 그 답을 알아요.","대부분의 학생들이 + 알아요 + 그 답을","Most of the students know the answer.","of 뒤가 복수"],
["그 돈의 절반이 사라졌어요.","그 돈의 절반이 + 사라졌어요","Half of the money is gone.|Half of the money has disappeared.","of 뒤가 단수"],
["내 친구들 중 몇 명은 부산 출신이에요.","내 친구들 중 몇 명은 + 부산 출신이에요","Some of my friends are from Busan.","some of + 복수"]]);

CH(2, "관사 — a, the, 그리고 무관사");
UU("L2-7-1","부정관사 a/an",
"처음 등장하는 하나, 정해지지 않은 하나에는 a/an! 발음이 모음이면 an이에요.",
[["나는 어제 우산을 하나 샀어요.","나는 샀어요 + 우산 하나를 + 어제","I bought an umbrella yesterday.","an + 모음 소리"],
["그녀는 일주일에 한 번 영화를 봐요.","그녀는 봐요 + 영화 한 편을 + 일주일에 한 번","She watches a movie once a week.","once a week"],
["코끼리 한 마리가 동물원에서 탈출했어요.","코끼리 한 마리가 + 탈출했어요 + 동물원에서","An elephant escaped from the zoo.","An elephant"]]);
UU("L2-7-2","정관사 the",
"서로 아는 '바로 그것'에는 the! 앞에서 언급됐거나 세상에 하나뿐인 것에 붙여요.",
[["나는 어제 책을 한 권 샀어요. 그 책은 탁자 위에 있어요.","나는 샀어요 + 책 한 권을 + 어제 + 그 책은 + 있어요 + 탁자 위에","I bought a book yesterday. The book is on the table.","a → the"],
["문 좀 닫아 줄래? (우리 둘 다 아는 그 문)","닫아 줄래? + 그 문을","Can you close the door?|Could you close the door?","서로 아는 the"],
["달이 오늘 밤 정말 밝네요.","달이 + 정말 밝네요 + 오늘 밤","The moon is so bright tonight.|The moon is really bright tonight.","세상에 하나 = the"]]);
UU("L2-7-3","무관사",
"by bus, go to school, have dinner — 교통수단, 본래 목적의 장소, 식사에는 관사가 없어요!",
[["나는 버스로 학교에 가요.","나는 가요 + 학교에 + 버스로","I go to school by bus.","무관사 by bus"],
["우리는 보통 7시에 저녁을 먹어요.","우리는 먹어요 + 저녁을 + 보통 7시에","We usually have dinner at seven.|We usually eat dinner at 7.","have dinner"],
["그녀는 내년에 대학에 가요.","그녀는 가요 + 대학에 + 내년에","She goes to college next year.|She is going to college next year.|She goes to university next year.","go to college"]]);
UU("L2-7-4","관사의 뉘앙스",
"a dog(어떤 개 한 마리) vs the dog(그 개) vs dogs(개라는 동물 전체) — 관사로 범위가 달라져요!",
[["나는 개를 한 마리 키워요. 그 개의 이름은 콩이에요.","나는 키워요 + 개 한 마리를 + 그 개의 이름은 + 콩이에요","I have a dog. The dog's name is Kong.|I have a dog, and its name is Kong.","a → the"],
["개는 충성스러운 동물이에요.","개는 + 충성스러운 동물이에요","Dogs are loyal animals.|Dogs are loyal.","복수 = 종 전체"],
["나는 커피보다 차를 더 좋아해요.","나는 더 좋아해요 + 차를 + 커피보다","I prefer tea to coffee.|I like tea better than coffee.","불가산 무관사"]]);
